body:
  text: 東土雞園偶集豐伸布贊海陵程紹昌豐伸布長白職官也與妻篤志淨業臨終有應贊曰蓮出雙花官居幾品回首旂常冠裳鼎鼎在道光咸豐之間乎書吳刻花嚴合論後無錫余治龍湫三疊安慶撫暑之古蹟也妙公曾與署中丞方伯吳公坤修坐其中訂刻花嚴合論之議吳之言曰臨江之塔有神焉予隨征紅巾時頗獲其助今署撫篆力新之鑄金銀銅鐵鉛五佛身唯鐵不中程命委員重鑄三鑄而不及其初焉知佛法一錘成就也又曰鉢盂竹笠行脚僧之物余皆有之坐園中聞鶴鳴泉湧有山林之想吳既畢合論之功遂卒雞園水陸歲歲祀之吳刻經不欲署其名於經尾念佛之餘刻指月錄棱嚴呪疏及釋氏十三經管楊諸居士等實左右之以回向淨土周貽樸事略泰州陳第周貽樸官兩淮鹽大使性篤雅深明佛意蓄內典千卷日以淨業為事嘗與龔舫趙煦諸居士相往還棲心淨土臨終安詳親見三聖而逝同治年中序龔令事泰州程宇光近世宰官中信佛法者或存或亡其梗槩各不同若龔大令舫助守淮城精誠通感一家眷屬篤志修行接引佛機虗心護念實名兵火劫中之甘露瓶也玉尺未出家時曾與文明僧往候之信宿而後去每述其人之梗概以為不可及舫字書舸以前署山陽縣致仕居淮城卒之時沐浴更衣自稱快活其胸襟葢可知矣清淨其神土不隔也論張淨庸汪善慶一切事皆自無而之有也一切事皆自有而之無也淨土法門亦然金剛密呪出於五方字種中無生也東不動也南平等西淨土北解脫蓮花部主本在一切處之西厥名無量壽十二名號最後日月光香光莊嚴從一微塵法門而示眾生以入路眾生機別遂不一其品從一現三從三現九觀大小阿彌陀經十六觀經不較然哉必欲依一門為究竟何可得也張君淨庸以淨土往生導人先路神迹雙清唱隨同志白毫光攝受事理必然而必執常寂光以繩之泥矣陳抱淨軼事蔣元亮孫墩史由敦之家有雙笛焉由敦之子吹之吉庄之陳子唱道家斗號響徹雲際足以降天神既而以玉尺蓮修法門穩便專志欲西不聞此調矣邀玉尺渡王家河訪一僧僧澹然無䇿進意陳怒而去之友人趙大禮居十里外之竹園邀玉尺訪之趙舊與玉尺習而老矣數年不見隱聲匿迹久而見之陳之年猶未遠於童也陳名不記記其入雞園時初更為抱淨繼而過雞園訪玉尺於百日關中不信宿而去遂不復見死焉心不顛倒也抱淨兄弟五人居第三餘皆習誦念如諸仙童頗靈秀抱淨死氣日散矣朱竹咸其師也遇於館中每共食後十年見於吳氏齋中又一年命車來訪蒼然一老志若童真好讀高峯語錄抱淨婦翁史某遠近昆弟三五人多喜念佛者禮翁吟陳第有禮有禮一老趙瘦骨清淨步履峭生子三人肖不肖玉尺問之語且笑子不足愛愛在道不以愛累身不以愛累心蓮花香滿剎寫出禮翁吟胡公書院泰山下玉尺大禮通情話陳癡趙俊兩無疑海陵一幅新圖畫我若先君去君亦不得住多少音聲起樂笙簫一片開靈路留詩作識君休忘莫令玉尺持短長傳述陳第事儀徵于養浩陳第泰州文生好善兼嗜佛老家言冷淡蕭條中盎然有春意每夜課至亥子猶不休茹素放生而不戒於飲酒之味經之義若有得不自知臨終披緇而去自稱玉成子程宇光別傳蔣元亮程宇光泰州諸生中式順天鄉試第一人在京師喜與英傑之士遊士之談性學者少矣有所說或不長宇光偶見畸士之言身心性命者奇其說返泰見玉尺而述之玉尺心知其非然觀宇光氣甚雄不與辯乃著身心性命一卷暢言三家而各表其同異既刊布四方宇光見之乃折節歎服稽首於前曰君若得道首當度我也遂次第閱內典與咫觀老人以淨業相砥礪自作挽聯云入佛已遲蓮品但求登下下做人最苦塵心那復賸些些曾蓄素珠一串香一瓣命終時顧家人取此物持之而逝曾以病至秦塘之雞園叩青鸞子示云身何以病心病之也心何以病身病之也宇光歎服以為名言為雞園弟子號曰藍霄雞園築屋宇光書楹句以贈玉尺曰垂老獲聞無上諦此中成就許多人筆意生動精神躍躍紙上鍾培棟小傳程宇光余有問字弟子鍾生名培棟年少壯氣清心厚有志於三寶聞玉尺之風將赴雞園而一謁未果也其兄死則請余代乞玉尺作法以度之未幾而培棟亦死矣玉尺哀其志祀之於雞園而問培棟之生平於余余曰培棟淨土中人也氣象浺瀜修持無迹玉尺所著念佛諸書最喜讀之久而益純心身不遠矣使天不促之以死何一見之難哉將率其眷屬以求一行三昧於君也卒之年同治乙丑云十五洲初圖䟦蔣元亮大江南北之中有洲焉長數十里寬亦十餘里洲之北熊姓庄屋在焉熊有子曰秉志陳君培棟之流亞也年少而志篤抱才而信法心依玉尺久矣未及見一旦而死玉尺哀之後以他事至洲欲購竹園以隱居欲見志而不可得為初圖以識之每一披覽如見志閱玉尺之書念彌陀之號精神相遇不遠也鄭老人別傳胡鏡之咫觀老人妙空子之父也籍江都為廩貢生年七十一卒於雞園之彌勒殿殮時或聞空中有異香妙空子不克送其終士烺送之既赴園中遂與熊子澤春等誦涅槃以超𥴱焉明年水陸首奉其名以入位或言其仗道場三寶力得入淨土中中葢神明示兆如此云老人性謹慎篤於宗族能作行書古近體詩晚而銳志於學佛菸酒葷血皆斷課佛甚勤看經甚力雖未證第一義而心知之用淺淺以引人因而入佛者頗眾與徐璧如程韜菴先生相往還事青鸞子謹生平境界略見於詩老人姓鄭氏名應房字駟卿晚號且翁住雞園一名曰藍光于藍澄事略泰州孫靈波于養浩一名守朴又號藍澄儀徵諸生居雞園數十年心平氣靜晚遇妙空子等遂作淨土課綿綿不斷後以病卒雖涉獵道家而心重佛法為第一晚十餘年頗有功於佛法云憶守鏡老人詩并序湖南曾傳鍇萬兆熊一名守鏡江都監生在雞園最久與于守貞練東霞諸有道者習既老矣與修士接見循循如孺子與玉尺有淨土願自號靜安念佛四十八萬以回向自少壯每日坐香至老不輟作圓通道場二十五箇月恭敬誦持毫無退怯於雞園事始終竭力為第一功或謂兆熊先作秦林先生仙徒後聞法華再熏起佛因云仙翁故蹟渺江流秦氏園空八景收故老幾人緣尚在圓通無礙鏡中遊陳定修事略通州李漢卿定修陳氏子籍江都幼年入學氣清才俊忽感寒疾不能起有勸之依玉尺以終者定修頷之故得今名雖不逾時而卒佛因兆於此矣𡩋之朱通之潘如之蔣泰之周皆有志有才而猝然天折晏子春秋云叢蘭欲茂秋霜悴之玉尺經營刻藏事嘆人才不足歲祀諸君於水陸宛轉悲思穆然意遠噫吳小泉周國定小泉江都人好往來壇墠習讀誦初作圓通期二十五月兼立淨土壇以念佛為助小泉既精心誦圓通復自潛心淨土因同行者少故未能深入也既二十五月畢小泉復請每年一次以二十五年為期雖期未終而身死然其志可嘉矣水陸既開小泉以道裝充表白者再熏習於大乘已久其去也葢不出乎觀音勢至圓通方便而能自立也噫嘻吳抱惕蔣元亮吳抱惕初為紅巾所陷自拔而出恨遇凶邪自深懺悔入雞園勤奉香火求念佛法門未能精通思欲謝塵服入道場畢此一世以求道要不能遂其願一旦命終齋志以歿品地未超可惜哉韓士餘傳童葆澂韓士餘江都人往來揚城內外兼習吏事通音樂而有志於淨土全藏之刻也玉尺得長者論於萬壽寺臨取時匇匇遺其尾本閱時久矣心不釋士餘忽至玉尺問所往曰揚城能為致信於萬壽寺乎曰能既去久之無消息士餘有眷屬在張綱鎮玉尺過之其眷屬直取諸櫃中而與之吳中丞施刻此書即據為底本或曰棗柏之刻全藏自華嚴合論始今亦從此始殆奇遇矣士餘亦有奇氣老而目昏不多出數年乃卒時光緒丁丑也贊汪法如居士江都徐國楨汪善慶浙之諸生也初不信佛見四十八鏡全藁漸入法要忽然勇猛即舉彌陀四字為話頭晝夜逼拶溺器傾於榻而念不止自謂透初關也然亦非無所得著藏龍集若干卷自名法如云嶽嶽其骨炯炯其光說趙州話遊鄭公鄉武林之弼邗上之芳死而未罷經籍之光徐訓導小傳通州潘一山徐國楨字璧如別名西來江都文生就職訓導蚤年有瘡報懺罪為善兵警中念佛消息從呂四達磚橋國楨實開其機而許中亟乃釗贊成之許樾身王荃汪善慶和之咫觀老人移宇光鳴皋暎帶之頗見一時善機之轉江以北水陸之道場藏經之書本推其端倪實基於此而人不知也國楨後為焦山救生局員在大江南北之中多接見英奇卓越之士遂卒於山生平淨願甚勤幼女守貞亦有修行之志胡槎仙事略冒同慶槎仙姓胡氏江寧人篤志為善紅巾之猖獗也避兵警者轉徙流離觸鋒𨦵而遂死者以萬萬計玉尺與槎仙及孫慕蓮三人以實行善事相砥礪願於海濵共護生機以保通泰如一帶避兵警之善根眾生而振起其修行氣脈其時鄭王許汪徐翕聚而談淨土誦護國經高氏與僧清徹暎帶其間甚盛也無何瓜洲鎮江之賊敗金陵收復數年後復故土者紛紛而海東之消息亦漸杳矣王居淮許宦於江廣汪住揚城徐司焦山放生鄭出家孫乃自居鎮江之故土胡由江南至石港由石港至江南卒於江南新開之田而不能再晤可惜哉胡之女生而白髮決志修西亦熏於乃父教也香光中精神往來熏發必多矣何琴軒如皋石麟何君如邑諸生也性迂拙而有大志才不足以濟其用每悒悒然常心係淨土勸人受菩薩戒以成就淨土未能純其修也於三教聖人互相異同處未得其要領欲兼宏之致書雞園千萬語悲苦之心愍眾生依戀經藏殆無有能及其愚者數月無消息問之杳然已長逝悲哉序蔣元亮無量壽佛十頌江都熊潤生世之作淨土文者或筆不高或不見快或學不優故所述不足動高才生之聽妙公病之於如皋得蔣生十頌乃嘆為傑作矣蔣生名元亮字步陶食餼蚤喪偶不再娶甫三十餘遂卒其補志及詩歌吾未見見其無量壽佛十頌而已元亮生而頴異知見甚正直未聞佛法時不欺因果嶄然見頭角矣經史之外如水經注說文各邑志乘多留心考覈文筆傑出詩字雄古有神非如皋一邑之士也然一邑之士無不仰信焉將出遊於江上經營藏經事緣未集而病早乘之以至於死乃獨以文傳可哀已抱負冠一時神明清極而有用入佛法不三年也已能哮吼師子兒哉館中教生徒晚飯畢不令人在左右手內典一冊倦則依床以燈就之往往膏燼天明卷猶在手葢其精進如此故未見其止也遊妙公之門不以諛遇不可或侃侃有言言必以禮即其言考其行長令人思云其十頌曰悲願第一光明一際誰佛誰生東西淨穢現此化城無始以來互為眷屬愍彼昏衢然斯寶燭非一光明非眾光明願光交羅攝盡有情勝因第二不立語言不廢文字十面縱橫無非佛事於苦世界現妙音聲聲中說法勸我西行無東無西全付一佛即此娑婆了不可得持名第三謂佛無情何以住世謂佛有情孰取孰棄一念相應心現九蓮瞬而失之十萬八千韻滿乾坤香熏庭戶心心不斷非新非故感應第四佛遠乎哉人人皆聖就而呼之乃無一應使佛應我如我應之頃刻成花何葉何枝一母千乳日哺其子子欲求乳張口即是接引第五掐斷苦根推開情梏一切眾生大夢同覺佛非聖者生豈凡夫𢹂手同歸竭盡無餘不知主賓亦非先後法報化身一齊授手往生第六憶佛念佛佛不立我本以淨因成斯勝果花色花光了了分明慈悲攝受生入無生浩浩劫波紛紛彼此一念還源不勞彈指法言第七百億蓮花互灌光明一一花中流佛音聲見相兩空是名壽者無量光明說此般若法筵清眾大海潮音徧十方界云何不聞品位第八本無人天唯有池蓮花開即佛見何有焉高低同觀巧拙一手失乳之兒盡遇慈母一心當令三障本空九品是一位位圓融善友第九蓮花剎海湧現毫端於一剎中普集人天衣裓香花諸上妙供此往彼來而無所動燁燁花開光照恒沙無一無異非自非他宏法第十一切國土有漏所生諸妄消亡一真圓成依真而住豈緣三受此樂已極不知其有巍巍神力妙用難停秘密周護本願常靈論生前七事憶潘君通州李漢卿潘君州之文生也生平謹篤銳志入佛雖才氣不足以副之而志深悲切渾然一真生前七之作君預焉封其牒命妻守之臨終念不改焚牒而逝逝之先見三寶像云孫蘭舫小事記甘泉梅香國孫君蘭舫幼讀書長為童子師性能豪飲善談論聞雞園玉尺之風不遠䟦涉而依焉遂盡棄其豪談善飲之習而純心受學從遊白下舟中校夢遊集見萬里無寸草句大疑之道念益堅從遊武林襄事於經坊猝然而死死之前因果較然也於淨土一門熏習年餘所鈔玉尺淨土詩以千計每鈔一首必涵泳其詞義而後運筆葢九品之蓮花香又吐焉玉尺祀之於蔣潘二子之次並為文以招之書周君事示同人如皋石麟周國定泰州人讀儒書未竟遊雞園因緣遇妙公遂信佛法以未能專力於第一義為憾耳為人之心亦切用心或過則機事現而神太銳矣於水陸道場及藏經有立功之處為來復門庭支持年餘不留餘力靈機本一未返本而遽終可惜哉其亡也以丙子七月坐聽念佛而逝新建蕭君事迹一願蕭君江西新建人也光緒丁丑年五十歲三月四日病越三日卒於沙溝寓齋念佛而逝生平於佛法頗懇切曾一赴雞園與其同邑馬君同依玉尺馬君述之從容而逝頗近作家也程松巖童亦舟兩人小記甘泉梅香國將欲自奮於一路則必懇切併力破境界以入之必有奇效矣然至於破境界以入有幾人哉夫世之境界情量為之也破情量盡則境界亡境界亡而境界都成自在矣松巖以病卒於前亦舟以病卒於後人皆未老也事業皆未全也松巖懇切而未超亦舟徘徊而未斷抱乾坤之清氣而銳志修途尚有隨境之心未亡而滯於中品之境噫二人之培植淨土者何嘗不深也往而復修幡然改轍必神受彌陀之點化矣譚壬生事述陳第譚壬生常州人避兵警於如皋好蓄佛書心超而氣清不凡骨也如皋介通泰邗江舟東入路必經過淨土之因與行人而俱到故久而益暢如是者三年兵事靖而人多散或有退志者壬生兄弟卓然不凡殆錚錚然矣不數年玉尺以事住常州欲訪其人已逝久矣煙水百城何堪指著然每繫人思也李漢卿傳石麟漢卿李君通州文學也年三十餘品純而氣靜與宋一峯及潘氏兄弟遊皆與玉尺習每舉蓮消息以勸人家中人多熏化而入光緒初早卒卒之時神明頗定念佛之願不忘倦倦以蓮消息為念欲通行於其鄉以暢淨土之因葢菩薩之用心矣母妹及妻信心皆足童寶靜傳略胡鏡之寶靜姓童氏名葆澂字葉舟常熟諸生候補訓導年五十有四於光緒四年正月一日卒卒之前病吐血病中一切煩燥惟聞念佛聲則調伏亦於念佛音聲中安詳而逝心不亂云常熟刻經處之立也向背者不一寶靜以純篤之修介乎范先生西民朱居士葆之之間才鋒不露而忍力甚優於第一義未能解脫勝出也然不起私意以擾公是非又多助行亦近來修士中之不可及者嘗懇切問淨土花嚴之同異玉尺以六相示之使自言同異又問往生淨土莊嚴虗空樓閣兩願大小玉尺以十玄示之使自思大小寶靜思議窮而踴躍至曰拖泥帶水圖不復作矣寶靜畫一人扯車車上滿載妻孥用物名曰拖泥帶水圖使人題詠其上將永思永言也六相總別同異成壞也一切法皆具此六隨拈一法六相現前十玄同時具足相應門如海水一滴具百川味廣狹無礙自在門如一尺之鏡現千里影諸法相及自在門如金與金色不相捨離一多相容不同門如一室千燈光光共住秘密隱顯俱成門如秋空半月明暗相銜微細相容安立門如水晶之瓶盛多芥子光影交參涉入門如帝網千珠重重相映託事顯法生解門如擎拳豎臂觸目皆道十世隔法異成門如一夕之夢回翔百年唯心回轉善成門如滿天星宿互相賓主程君竹溪小記冒同慶程君以幹事之材專營善法蔚然人望蘇垣顯宦多知其名有災賑各務多用之以集事同治十三年直隷水再往佐賑伯相頗重其人留辦既久遂卒於天律或曰難民思之作祠以祀之程君信佛甚深念佛亦切其卒時亦不離念佛之因年厶十厶名厶字竹溪鄭同軼事熊潤生鄭君名同蘇州人兵燹後還省城以童年力爭於強家而復祖業顧殷殷然有志於佛虞山之張通州之潘最相似也欲赴雞園隨玉尺養性以終願未酬以光緒三年卒卒之時囑其弟曰刻經僧有所託我雖不復能為彼集益然我心何可不盡必為我刻一卷大般若以誌我之向往神明不亂因果較然往生之品也余蓮村翁行事熊潤生世所傳文惠先生年譜舉其同於儒者而著之也其實蓮翁之心契第一義諦也久矣世所傳一得齋全集舉其有言說而筆之於書者而表之也其實蓮翁之虗心受益不擇方內外也久矣世所稱演劇刻圖勸善保嬰諸實事舉其彰於耳目之前者而傳之也其實蓮翁之棲息神明於十萬億佛土之外也久矣聞之友人曰蓮消息之書初出蓮翁於常熟友人家閱之曰此義已淺而以之普導世俗也猶嫌其深嗚呼蓮翁之婆心誰得知而觀其所言可以知其心中之尺寸惜乎未得專致一路而散善波濤太眾也聞其臨終能統散善之力而回向一門噫切矣許貞恒居士入佛小記泰州李景鄴昔四十八種叢書今之寶色燈雲四十八鏡等皆其一種也為徐璧如所節錄久而其稿依人而遷於呂四有汪善慶者與徐同館於許之寓稍披閱而談及之而靈虗子又從而和之遂隱隱有念佛之機欲動矣許貞恒居士乃釗靈虗子樾身之叔父也自中丞罷官後因江浙未靖流寓海濵一日叩於神曰我欲學佛學仙以何為妙得學佛之兆又叩念佛有光乎答以有光遂決意命家人以念佛印深老人靈虗之母也與同其姊悟源其姪女也還西悟真源之同輩也一唱眾和念佛者以百計因而作書致玉尺招之東遊以暢念佛之因實貞恒居士轉之也初貞恒為學使差次乘人輿行水中忽聞木魚聲久而不相離數日矣心異其故途中岑寂心慮灰凝試以阿彌陀佛四字微轉於胸喉之間乃木魚之聲與佛應節試速之魚亦速試緩之魚亦緩乃累世之遠因也其先寓泰曾邀玉尺一見在呂四未見也玉尺出家至杭貞恒相見甚親出力以助刻藏之書者三年久之玉尺募刻般若等經兼立法雲經坊流通法寶貞恒居士出力相助如初然常以為孔子之書妙理本暢或以注而反晦於蕅益之四書解心嚮往之甚切其卒以光緒戊寅書徹如居士事梅香國張君昆弟在虞山與刻經僧習知刻經僧集諸稿以成聞見錄手書其先人事以付之其詞曰先父法名今達字徹如少好道家書既而疑其說之非究竟求內典讀之曰此真我身心歸宿處也一意佛乘棲心淨土年二十六大病持西方佛名不輟一夕忽曰見佛光隱隱我其往生乎配厶孺人以割股為求壽病尋愈因避寇東鄉禮問竹師受八關齋戒返故居事繁課轉稀同治六年病持佛名未及前之明快家人助力乃安然逝年三十八云刻經僧見徹如居士手鈔數種精到絕倫每有回向輒偕二子書名故其人雖往而一家與起於蓮修者甚純未始非香光熏發之力也西園道人傳楊省愚道人姓談氏名廷楨字凝生西園其晚號也世居常州西門外自幼沈靜游鄉先輩王逸雲先生門汪知其不凡也納為甥弱冠入邑庠輸粟為教諭殫心經史有濟世志無何失偶遂歸佛乘宗教兼通老宿目為法器晚更專心淨土曰願學觀音度眾生即䥴為印於城北鄉鄭陸橋創念佛社信者甚多同治某年月日感微恙自知時至曰吾當西歸眾涕泣請留曰無已再住一年耳預戒眾人念佛兩晝夜眾請法語曰接物勿高聲忙中勿忘六字勿破戒棄前功如常早課堂中西向加趺而逝一晝夜始殮危坐如生淨空曰吾聞西園道人徃生有化佛垂手異香滿室之兆吉德興十三歲事吉母小兒德興年十三姓吉氏隷江都生一年而喪父自勤於學初不知有佛也讀詩經論語古今文章而已病中無襍語唯言穿衣著履身是狀元遂朗誦生平所讀文字數萬言命換衣服曰阿彌陀佛及觀世音在空中來接光緒五年正月十日辰時念佛數聲而逝書奉化杭州兩居士事德修奉化某居士修淨土冬夜忽自言佛來遂汗披小衣而已妻以棉衣加之擲地曰吾欲往生汝勿來擾遂念佛而逝同治末年事杭州鄭元隆居士法名得道持素念佛數年光緒元年三月十二日自知時至命妻集家人同聲念佛以助其往生念盡一枝香遂微笑坐脫韓清塵小傳張寂吾邑接待寺自光緒辛巳同人闡普仁截流大師遺法啟春秋念佛道場其間䇿勵精進者不少而梵音清妙悅可眾心者必以韓君清塵為第一清塵初奉佛不甚明理近歲閱淨土諸書略識一心三觀旨病時見壁上現佛相初文殊次普賢觀音既而三聖畢現然迫于遇未能全體放下得善知識開導乃省臨終日謂其妻曰吾今日不起矣毋相戀惟一心念佛自晨至夕佛聲不絕遂逝後曇影之逝十四日同邑有方嫗者亦于是月念佛而去他無瑞應惟氣絕而頂緩云
