body:
  text: 東土雞園偶集量海尼傳稿蔣元亮往常與玉尺家居考訂淨土文字四衆中獨少尼之著作竊謂天地清淑之氣必不以類而有所輕重於其間況方以類聚則同類之身必引同類豈但有身教而無言教者乎玉尺既出家謀刻藏經往來吳越之地乃獲見影響集於古明姚上善之手其中著作述淨行者多蓋比丘尼量海之筆也既與同人酌訂吳門四衆弟子詩即以影響集入焉而淨土之人文小備慨爾嘆曰人何必相逢相遇乃為淨土知音乎如李素真冒其孝鍾培棟熊秉忠陳鴻謨乘戒量海諸上善皆未有一面之緣而精神如不隔其在左右者或數年而合離之感往往於心境遇之如文明周國定甘雲開陳靈復茅慧雲蔣慧生之輩空中變化未得其端倪則此世他生之成就能不令人思且望耶量海戒定夙根慧心初裕上品之資也其集中尼戒一篇尤見東土大乘氣象廣元哀詞泰州冒同慶當全藏之未刻也或有以種種放生念佛之書募刻者雖非大宗亦火之前相也而廣元輒先赴之元泰州南門外某庵尼年既老矣而志不衰玉尺兄弟在泰久與廣元有刊刻龍舒文之願言既成元已卒蓋含此淨因以往矣玉尺出俗時行過某菴而元已無踪跡有人言此處尚有信心人可續募小緣以助刻資玉尺事多故未往然心心憶之同慶邑人也為作哀詞示後學詞曰光華冷淡閴無人兮宿草蕪生塔影淪兮法幢盈空唯一真兮蓮花部主慰汝神兮量海軼事蘇州姚古明量海避兵有惡疾人曰既是大修行人何故有此惡疾答曰此一一波羅蜜非汝所知也臨終時徹夜呼余名既卒人以告余余曰此時真喫緊念佛未遑豈遑念我寶念出家之切胡鏡之寶念江蘇候補縣王君蔭福女母早卒隨父署縣任中一日請父欲有所言父命之至以終身事父為言父許之久而移寓泰州父請刻經僧為說菩薩戒并請書鏡影鐘聲以示之稍有所明未徹也又隨父至江寧寓遂至接引菴出家志甚切於其年之冬遙禮刻經僧削髮出家不久遂卒刻經僧為訂出家名字未及知也其勇於脫塵而疏於覓法蓋入佛未深之故耶然其迅速精進以自全其天則亦可以諷世之為修行而終身不決者靈義傳金陵朱生靈義江寧馬氏女二順也年十餘見玉尺傾心受教性警敏能解大意既而病欲見玉尺不可得命作書請玉尺渡江家人誑之不以信達也玉尺有他事致書金陵弟子靈義忽謂母師有信到何不探之精誠通感如此可謂哀矣養病於藥師菴待玉尺不至自知期迫對佛落髮為沙彌尼玉尺久而渡江知其事訪其處太息久之祝其魂魄祀之於海天精舍追說菩薩戒稱之曰菩薩沙彌尼靈義雖苦於病魔然心光朗然至死不變其不隔於無量光蓋可知矣寶進進字說石麟寶進之遇人不淑而知退也必進於道矣既志於道而未得所依止也進必化為退然退於一處非退於處處其進猶存也勇於義自願效力花嚴處移而心減不亦退乎然大退者數人而彼勉力以完其半願而周旋於玉尺之前而退中之進象也至於得地安居披衣削髮而格於心境不復與善知識輪誠意而寫天真真進之機何在乎寶也幾何可弔也與其進也噫能持事略紹興慧音杭州太平橋葉菴住持尼名能持年六十九己卯七月二十九自知時至集衆念佛端坐而逝面目熙怡方炎暑次日封龕形色如生飛蠅不犯其几筵此真淨業所感也杭州近日比丘尼中以穆菴慧師葉菴持師為名望最著者杭之客尼蓮化病歸卒於無錫舟次人甚懇切但慧解不起耳仁華每提醒之猶未甚得力惜哉仁華亦江南尼衆之傑出者明恆傳德修明恆先為優婆夷住寧波鄉之青蓮菴專修淨土因病遂剃髮念淨土堂未曾完工病中每抱憾有妙理法師者示之曰世事未了有人替汝生死事未了無人替汝今宜收下一心歸命矣又有式教大師者亦時來警䇿遂默受善誡妄想芟除一日晨朝忽謂大衆曰今日巳時可行或問曰巳時向那里行曰汝豈不知西行至巳刻果安然坐化論曰善知識之恩大於父母能使善根散而復聚觀於明恆益信世之學人猶往往不知擇友悲夫
