body:
  text: 東土雞園偶集十方人天生淨土名不必傳以淨土本超乎名相之外也今之人乃多以生淨土傳是耶非耶又且諸書互異事蹟或不同蓋難定矣讀經之暇輒取友人寄來各傳刪而存之不增一字間有長篇仿史例縮長為短亦不易一字也表其修西不斷其生西去取之權不可冒也以之引蓮華之一脈破長夜之昏沈近之矣果有自信圓宗深入佛海上遊樓閣俯聽靈禽此一卷書未嘗非流水光明中鳴空天樂矣諸作以見聞之次第為次第歲歲增之始志於同治甲子初刊於光緒丁丑標其類曰比丘曰比丘尼曰居士曰善女人曰童女曰雜流曰異類述定意老宿事武林汪善慶定意武進人生於乾隆庚戌以禪宗主席嘉山兼以淨土接後進嘗謂徐國楨曰我近來不及從前從前用功力時飲食不甚知味今頗知味矣避兵於江北在雨聲庵佛七會中振起多眾善根不事矜持後學淄流仰為山斗不務名而求實者也坐化從容弟子有家法書定意老宿事後如皋蔣元亮德生謂善財曰汝不應修一善照一法行一行發一願得一記住一忍生究竟想汝不應以限量心行於六度住於十地淨佛國土事善知識今之修淨業者入於方便迷於究竟竟不知純想即飛必生天上若飛心中兼福兼慧及與淨願自然心開見十方佛一切佛土隨願往生亦不知我若欲見安樂世界阿彌陀如來隨意即見得一大木斵而小之稍有出格譁然生訾議伏種種根粉飾遷就老宿不為也老宿淨土中人也生於娑婆視娑婆如淨土故人以淨土中人待之其精詣入神未知若何於大乘第一義聞之熟矣於一切時處見一切彌陀當不作戔戔舉動也天寗普能嵩禪師淨土詩序吳淞范國俊自來禪淨兩家強分門戶讀永明四料揀知萬修萬人去一條大路矣然鈍根或難語性宗上智又淺視淨土二者葢交譏焉夫禪是淨土之禪淨是禪之淨土不明乎此雖坐破蒲團焉知心即是佛執持名號何云佛即是心佛性遍虗空滿法界世間山河大地草水禽魚無一非吾妙明心性中物則此七寶樓臺六時花鳥何莫非吾感應所交變化所作乎普能長老余曩遇於天𡩋寺禪淨兼修洞明公案十數年後復晤於毗陵丈室執手謂余曰吾今專念佛矣出其淨土詩百八首而問敘於余披閱一過如願力擊開彌勒閣信根直上妙高峯應無所住名蓮土纔有纖塵號境風念念不生秋月現心心無所覺花圓等句是於淨業中的的指出禪理又禪歸淨土本同體淨入禪心即共源真禪淨打成一片矣然則普長老昔日談禪是淨土之禪今日念佛是禪之淨土又何疑哉嗟乎娑婆濁世何必再來兵燹餘生當思特出念佛橫超三界華開聞法畢竟禪淨殊途同歸也因歡喜讚嘆而為之序至於因言顯道得意忘言當求言中意並言外意勿斤斤於字句工拙是為善讀是詩者鳴皋傳蓮發鳴皋如皋人出家住持定慧寺戒行清淨土切正行勤故許中丞唐刺史徐訓導熊文學等咸尊敬之退居後遊方參問其志不衰臨終有往生之兆或曰既卒後邑人夢見城外某廟神奉鳴皋之約束錄取念佛人名擕之西往或曰有人夢送至西方冰玉河而去遂遠此皆鳴皋精誠之所感現也在寺之時正紅巾擾天下唯上海一粟菴掘港西方寺能蘇僧伽之困如皋雖無大建立而有善知識從容化導於無形法器時鳴賓客不襍儼然輝映於江之北焉譚何吳石薛徐高等諸居士於數年中能圓發善根入諸法要一幢之在面面都靈未生淨土以前有此力用其不遺一物願同往生之局量可知矣法師身後緣記無錫余治有乘戒法師者居蘇州城外小普度能講說佛法一時興起者甚眾若居士徐古璵女士姚古明皆其弟子也淨業精勤嘗著詩一卷諷詠箴規揚清激濁今其詩與尼量海居士彭際清善女人陶瓊樓所作共成一編名曰吳門四眾弟子淨土詩云玉尺初作諸生時赴浙闈還路經其地懷自所作淨土文字以求正入門則佛事匇匇賓客濟濟已圓寂第七日矣悵然一拜焚所作於靈案香爐而去頌德慈老宿儀徵陳則競德慈廣西隆安雷氏子生而茹素十八歲落髮於九華即受具結茅終南山修禪觀久之出遊訪善知識復入終南山住六年官兵搜山又出遊檢藏焦山因緣得遇高旻方聚成禪師遂傳心印主席高旻二十年法筵頗盛塔紅巾至欲殉高旻眾止之往往以瑜伽𦦨口取信於人卒時俗壽八十三云生平淨業頗勤依觀音甚切殆中品以上人頌曰一杯甘露十年終南高旻高旻是誰同參書靜波禪師事如皋黃文波靜波為金山首座性直而清懇切於佛法知因識果方便接人或用禪規或以淨土葢一以佛之解脫為本故無多霑滯一往而能離近今罕有者臨終安詳頗有往生之驗書靜軒禪師事泰州周國定孤迥迥者非禪也而昏擾擾者亦非禪冷冰冰者非淨也而熱烘烘者亦非淨必有超乎境地之外而後本性長伸本願長滿此中何嘗能苛責到秋毫分際而一往獨到之處亦自有不可掩而默有以成己成人者吾於靜公見之矣淨在於心感現為土固不以尺寸形迹待人逝者如任生者如熊皆其門下也雞園念佛僧文明事略江都鄭應房本然字文明天長人出家本縣龍崗白衣菴寶華山受具戒赴阿育王寺然一指性誠切微鈍既參訪金山高明天寧崇福已悉大意然常以桶底未脫自愧也與人共住一菴因緣遇玉尺遂彼此相䇿勵既而同聚高郵放生寺又同遊於淮訪龔大令又同赴雞園念佛道場精進者七日松雲明舟達源張淨庸皆至未幾而歸寺結壇誦普門品經禮大士聖號每日千拜數月而卒葢向西合掌神明安住於念佛音中也常以念佛三昧許玉尺玉尺不敢當而本然之嚮往愈切故其逝也專精念佛不襍以他兼為法幢之故憂至於死有心哉松明達庸亦先後化去往往有淨土之徵云書明舟師事泰州孫蘭舫文明之死也玉尺頗以明舟為友久之而後達源至三人皆淨土純品也骨董者文明也綿密者達源也若明舟則亦密亦疎亦通亦塞當法用之初機事未靈淺人誤事英俊之立足已難矣主伴之神明又或疎而未接故生多種移游一旦而退入中中亦事情所必至此人固中中以上材也書達源師事蔣元亮達師之為人綿密懇切不以世事攖心而利生念佛一往而愈真有迢然不可及者矣徒以事緣之未集道場人跡一散而難收雖賢智者亦不免久而思懈矣機中於中而事應於外故一移而去遂不能烹煉其材及身而成上品可惜也然而精純之氣渾穆之思慈德之殷願力之切有彌久而長令人思者文明而外此其一也僧心莖別傳儀徵于養浩心莖字如恒一名凝和揚州人出家受具參訪有年晚乃住雞園甚久病而後歸曾與養浩玉尺三人作淨土願又與玉尺在祝仙洞發度生之願其心甚雄好作功德利益行瑜伽𦦨口多奇感云淨土以音聲而得入最為妙機心莖每引聲讚禮或跪誦圓通二十五聖自述生平圓滿浺瀜令我神遊大淨土也靜悅傳周國定靜悅嘉善人跛足中年出家受具因高子才識玉尺居雞園兩歲有餘日禮大悲行法頗有感應淨業甚勤後依來鶴寺以終逝時有正念蓮發傳如皋石麟蓮發姓朱氏江都人受菩薩戒於焦山久乃出家復受具於海潮寺為人木訥不求通方然亦有古拙不可及處修淨業亦頗得入有志於助募經藏未能遂其願抱志以終神明不散也生平多苦行他人或勸止之必不聽玉尺以第一義曉之勉應焉損過就中未及純熟玉尺將以法寶供養其餘年而發不及待遽卒於戊寅正月中旬可惜哉蓮慶哀詞石麟覺泠字蓮慶通州盧氏子依師文明位出家於栟茶妙香菴年已老矣而勇進不減率七日一閉關每欲有所建立輒以力不足而止然未嘗不有功於藏經也作小石塔泠然置案上日坐其旁而自課長與玉尺遊自奮於念佛三昧以慧稍歉未能領悟全旨而但以苦行終可哀哉詞曰君之病以太苦兮君之心則何阻也君之去以太孤兮君之志則不虗也丙子之冬揚州之東妙香之中世壽之終香無終始兮妙有去來一覺泠泠兮慶蓮花之初胎福魁傳大根福魁天長大覺寺比丘也於高郵承天寺受具於放生寺終疾時醫不效一心歸向西方花池撒手時自坐龕中懸文明所贈接引像凝神注視久之松園傳大根松園高郵朱氏子幼有疾醫治無效一夕夢神人謂曰汝必出塵病始能愈寤即立願疾果瘳依師普潤出家於八寶觀音寺受具棲止城東蝗王廟行苦行勤修淨土率眾持名至忘寢食一日宵小踰垣至臥榻旁搜羅一切松園方注想華池故置弗問凡對人無他語但囑其死心念佛童叟悉蒙化導同治戊辰仲冬疾前數日囑四眾曰吾將歸去汝等勿憂戀助我念佛可也即於初八日晡時念佛而去行僧記無名氏某僧居京師長白如山都轉常見其人渾樸苦行志在西方臨終灑然而去生平無惱無恨故獲如是果銘初傳稿大根銘初儀徵人披剃柳隱菴性好博覽兼通儒釋氣度寬裕主席資福二十餘載懃懃懇懇為法為人退席遊方感化極多居寺一室杜緣習淨寒暑不易咸豐二年避紅巾返寺預知時至無疾趺坐而逝春秋六十八福元傳大根福元棲止鹽城之沙溝與同住僧為人誦經或有率略福元回寺必重誦一周以贖補之雖深夜嚴寒必如是瀕老一心淨土課佛有定數精進八年臨終持珠輪誦佛名擲珠而逝某僧事述武林高原某僧不識字而淨業甚勤精進每有感應或見幢旛上有字述以告人人問何字僧以指畫出葢西方接引四字也未久而卒經如傳大根經如金陵李氏子李氏世有簪纓經如幼疾獨抱之遊寺中則愈家人乃施之出家依法源為師華山受具精持行願徧訪名山四旬後主席鳳陽寺傳戒十三期化者益眾久之精通內外典披閱稍閒即課佛恒以萬計紅巾滋事避地普陀巖八年乃歸同治己巳正月八日謂門人曰吾四十日後當去即有一匠人來作龕眾問何以忽來匠云有小師喚我其實非小師也屆期沐浴更衣移坐殿旁然定香於爐曰香煙盡吾當謝此娑婆也已而果然宗道傳稿大根宗道海陵人出家普福菴苦行堅節常念佛恩之重誓欲捨身以報隆冬敲凍投水以清心閉關禁語三年後於塔寺建念佛堂力修淨業佛前口占一聯云曠劫輪回決要今世了斷一生淨業全憑此地成功又釋經旨為人解說鶉衣百結含糗終身無疾而逝火焚得舍利數十粒道光某年事體成傳稿大根體成字妙果東臺人幼出家方直有戒行能開化愚蒙拔邪歸正屠宰感化偕同志數人設念佛堂力修淨業者四年人有缺乏推己及人勞苦艱難逆境當前無憂色操持日不怠微疾而逝事在光緒元年春秋六十六懌安傳稿大根懌安字明謙東臺人幼年苦行持律精嚴常佐華山戒事出山參知識儀徵資福銘公印證遂傳衣鉢潛心佛理畢命為期每年正月起閉關四十九日不坐不臥不偏不倚翹勤念佛以為常縉紳士庶傾心歸仰者甚眾接後學慈善過人退席參方終於千華微疾而逝火焚獲舍利數粒事在咸豐元年春秋五十六自明傳稿大根自明常德武林縣人持戒習禪見良蓬山四面幽寂左右墳墓重重乃鎮江棄人於市之處師曰此間念佛正好利益幽明於是露地而坐三晝夜念佛不輟感道俗助之不一年梵剎輝煌與如月常相往來時人莫測如月復住終南自明告眾曰天地長久尚有壞況人世無兵燹乎無疾逝事在咸豐元年如月傳稿大根如月字妙明常德武林縣人性至孝慕禪宗父母終棄妻子投寶相寺出家持戒精嚴脇不沾席結茅終南三十餘載出則參訪名山小住鎮江蓮花菴日課禮佛三千念佛十萬金山閱藏五年高旻閱藏五年天寧閱藏六年語將來事有應復入終南山禮拜合掌稱佛名而逝火焚得五色舍利半升餘事在道光二十六年十二月十六日春秋七十六善根傳稿大根善根字仁慈海陵陳氏子有孝行抱出塵志父母終年二十八棄妻子出家戒行精嚴專修淨業一切時中應機設教寰宇名山遍往參謁路過一菴淨心念佛放光滿室眾咸驚異晚年齒落重生預知時至無疾而逝事在咸豐六年四月十一日春秋七十九月參傳稿大根月參陽湖人真誠勵志寒暑無怠避𡨥昭陽杜人事力修淨業偶微疾囑後人曰吾十日當去同治六年二月十二日夜午端坐念佛而逝有日紀一本每日誦蓮花經一部禮佛課佛甚勤火焚時若男若女無不合掌念佛稱讚鉢不得舍利數粒春秋三十六施念藏小傳鄞縣周生念藏姓施氏通州人性愛修行嘗以鑼代鐘命女擊之以表旦暮焚香之節愛作橋以濟人茅檐土室中能供養清徹僧閉關者三年尤人情所難也久之出家卒於海門清徹僧能畫佛塑佛念佛好一人作瑜伽𦦨口施食法持大悲呪快利鋒迅與念藏交最深云念藏因清徹故亦嘗與刻經僧往來刻經僧每欲以一劑清涼飲其枯腹而未果也其詞曰遊徧身中剎高低不計年花嚴非草創海印現漚圓忠孝神仙夢聰明富貴緣定光端直處明鏡九州煙互作身身住身靈事業靈毛中旋地脈塵內轉空經動息超三界輝華露一星神通非小可與物共泠泠莫作如如解絲羅引妙光一毫容大剎實際住空王與爾遊其內何人不在旁喧卑徒自困天外本馨香豈有修成佛空勞夢裏愁天人何悶悶海水自悠悠不學阿羅漢誰為楚國囚光明常解脫欲取已驚鷗法界寬時緊毫毛不可欺幻中來飲酒空外自觀棋手筆誰輕重光陰豈疾遲獨饒平等性寄上綠楊枝觀法真成套禪那竟不靈行中常自坐閙處每聞經淡色銜濃色金星化玉星夢魂無限事說出少人聽一極浺瀜意留心已不堪何人談六相無事且三餐佛出花枝現心空鏡影涵幼童彌可喜毬舞自交參彼我交相用奇哉總佛陀邪通矜縮地幻苦欲奔波今日原無事閑中且作歌橫空明鏡在一一總新磨一二猶成妄何勞計有無夢中分別困醒後性情如雨雪誰年月文章孰魯魚泠然全在目萬徧畫葫蘆一部莊嚴典都成破碎痕尚無真我相誰是法王恩經卷空塵襍光明夢覺存執之何太苦飛舞任乾坤此詩亦名夢遊十首悟開事略常州董淨空悟開住常州天寧寺生平唯務實行過午不食夜不倒臥常坐一室精勤念佛諸弟子有餽送者輒拒之臨終數日前徧別諸友屆期神色𤈍然無疾苦頃刻化去已而復張目云我適出寺門至木橋而返今直往西方矣言畢寂然初有塔願未了既遷化其滬上弟子某見師囑以塔院事逾月其弟子挾貲往天甯方知師已化去眾莫不嗟異同治年事行僧廣寂讚并序胡鏡之讀常州賦注見廣師事喜而讚之常州賦注云廣寂姓馮初名時熙更名定中萬歷乙酉鄉榜通判廣州棄官歸依雲棲薙染捨西園唱眾放生建十方菴接待雲水專修淨業勸人戒屠宰每跪而哭夏月不驅蚊臥蘆葦中任其囋膚塔於華山之佛手窪觀時識勢棄榮謀枯蓮華芬芳吐之彌腴自他體同能所都盧慷慨敷陳仁言利敷吁嗟兮葫蘆妙樂是真珠阿彌陀佛篇朗月彌陀是一一人心所同具也至於渾忘之極除阿彌陀佛四字外別無所短別無所長而人遂以阿彌陀佛名之亦奇矣泰州北門公侯廟僧瑞棠孤單而純懿衣食隨時不求足非戒不履也無欲無求世莫測之每觀世相慨然曰身若流萍去來甚易謂同類曰慕道懷仁觸類斯在世人之誤由愛易動而守不堅也每與好佛人家有來往雖日中或神倦徑入室中臥醒則翛然去全忘顧忌世人亦絕不顧忌之奇矣己卯八月微疾端坐繩床口誦彌陀形氣調靜終於薙度之菴春秋七十八
