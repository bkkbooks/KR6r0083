body:
  text: 東土雞園偶集周婆事述山庵襍錄無慍鄞縣寶幢寺周婆修淨土每正月不語不臥暑則施茶湯盡一月年七十餘忽夢大蓮葉滿覆寶幢自持念珠經行其上感微疾鄰人夢幡葢入其家黎明訪之婆已合掌念佛而逝唐孺人母子緣述泰州朱竹咸今音老人唐氏初以往生陀羅尼教其子玉尺成誦玉尺屢夢見大身人金光赫然一日問曰人生必有死乎老人曰然然則天地亦有壞乎曰有玉尺疑之曰天地壞時人死時別有不壞之境不死之身乎且未有此天地未有此身我在何處住既有天地既有身我從何處忽現此心必有不待生而自足者在也玉尺有過老人撻之玉尺問曰母與子一體乎曰一體一體則母何為自撻也老人笑而止及玉尺入泮娶妻老人病且死玉尺避兵警老人精神現夢玉尺出家老人歲歲入水陸道場故知老人不壞之境不死之身長在玉尺之上玉尺之左右常熟某氏婦事述石麟丁丑六月有送摩利支天像於栟茶之妙香菴者晤徐君三人好佛法言其戚繆沈氏者常熟人也有義母焉生平好供養三寶病中感夢因為夫置妾而自力於修行其夫惡口謗之受嚼舌之報而死沈氏愈精進臨終預知時至具齋邀親友自居首座談笑而逝平生能前知有火灾命預作紙屋以代之家人以為癡紙屋故不全後果有火獨焚其未有紙屋之數楹杯露記通州李漢卿長興朱保之妻曹氏者虞山人也初名妙曇刻經僧遊虞山保之請主其家曇出見求菩薩戒玉尺未敢𠃔也姑語之曰汝知清淨蓮花不易入光華暎帶之可也易其名曰蓮暎後於乙亥六月十八日偶過其家蓮暎令其子捧露一鍾進玉尺曰清至此乎明年曇遂病病六閱月而卒虞山蓮韻記石麟常熟東南有王姓婦年三四十矣於同治辛未聞玉尺赴虞山精誠來謁蓮語曰彼之欲見師已數年今適滿其願見之後於花嚴消息踴躍能入玉尺借端開導引入圓宗俄而別作偈寄之并勉其子之讀書甚悉有五百金欲作第一佛事存於一處其卒也友人不克踐言可惜哉婦某氏法名蓮韻徐太夫人傳徐國楨太夫人徐宮保女也幼慈慧適錢唐許刺史玉年敬順有婦德遇三黨以恩禮不因貧富異待下無疾言無怒容生五子二女皆貴顯太夫人恭謹無奢念自減省以作眾善冬棉夏藥放生濟急於三寶因尤盡心力人有以未來富貴祝者應之曰福報盡落輪回也吾唯求生西方以了生死自署名曰印深子自此以後每朝夕唯以念佛為娛家人化之故淨土法門復能盛行於三江淮海間四方人苦於兵而板輿所至每有安樂之想葢隱隱保全無數矣初以避兵警故寓通之呂四其子靈虗子與友人妙空子及西來徐子法如汪子幻有王子以淨土圓義相切磋靈虗子有所悟必入以告故太夫人洞明事理一意往生闔家既回向淨土親族熏化皆歸一願葢指不勝屈矣同治甲子夏習靜焦山有太湖漁人得彌陀像夢此像囑其獻於太夫人因築香光樓以供且書其兩楹曰寶地豁開心境界江天妙寫佛音聲可見其啟發者甚多矣乙丑七月夜佛光明現於室圓相燈火共化為紅蓮花大尺許輝華掩映初以為異既而思之曰此殆以火中蓮花之義䇿我也丙寅在揚寓夏曰感微疾愈兩月忽曰吾將歸矣家人以為返杭州去也太夫人笑曰非爾等所知七月四日晡時起盥洗易衣服自見光明滿空異香充塞光中有僧著水田衣持錫杖旁侍一童作相近狀乃召眷屬而告之且勖曰我無𦊱礙爾等皆念佛自亦念佛繼云蓮花至遂命將所誦西方公據二冊焚化一時許自云見佛來迎乃含笑仰視而逝五日子時也太夫人既卒室中有異香頂煖竟一日年六十九許母徐太夫人別傳唐持平妙空鄭子以念佛法門唱於海陵著書四十八篇傳於徐汪許三家之手海隅淨土之風起焉初赴呂四館於呂東署作四十八字以公諸同志不論貴賤老少智愚各取一字而去自製一字配之以為念佛之名時許母徐太夫人適拈深字自製其名印深遂為許氏念佛之始年六七十矣謙遜慈厚不以富貴先人而因之以修者甚眾孫女悟源其一也若與同若還西若環真若緣覺若玉虗若雅奏若正覺若悟真雖其中所造各殊而精神炯炯往往能以淨土音聲度出三界許氏之親族鄰友引而益長佛緣彌著焉周旋久而成就多者唯靈虗即其幼子云深印老人有西方之兆甚多或以為堪希中品噫江樓夜課眷屬滿前何其盛風帆沙鳥經聲梵唄如一幅畫圖不可即矣喬夫人軼事泰州陳第喬侍郎夫人某氏深純篤志淨願頗切未知於第一義何如也而風聲甚遠淨業中之英靈也嘗至一叢林請僧代修大悲行法僧集夫人叩以觀中詞義僧茫然夫人曰願以異日正覺子傳蔣元亮正覺姓朱氏江南人許靈虗居士副室也幼性敏長而恭順孝慈年二十九子方九歲正覺遽以疾卒疾初作佛事善舉建力甚勤久而生退轉但以病為憂矣靈虗時醒其迷一日忽謂靈虗曰勢在必死當何處去曰本以往生為願何頓忘之正覺曰然則須念佛由此精進且曰夙業來報正念先疎也一心直往眾苦皆離方為好手彌留際靈虗為禮佛侍疾者見白光照正覺之面正覺亦自言見蓮花遂安詳而逝焚其平時所誦西方公據火中現金光湛然殮時頂煖書善一事泰州趙大禮善一長白人都轉如山冠九之夫人也夫婦雙修極人寰之望如在湖北見玉尺所著彌陀注解翻刻板一副存歸元寺以故善一知玉尺之以華嚴觀作淨土修也玉尺以刻經故渡錢塘晤如於衢道署如至寺五次玉尺赴署五次善一每以華嚴淨土之義叩焉適其妹聖全死期臨百日請作佛事玉尺為其說華嚴十𢆯門衢之僧俗觀聽者傳為佳話遂以刻經之資首助玉尺為全部書本藏之第一檀越善一之生平喜念佛及禮大悲行法一日者欲延玉尺至穆菴為女眾說法玉尺未往後遂以病卒於菴不復見也先是玉尺未赴衢道署善一預夢大身善財故信心甚至善一既以淨業精純念佛而逝杭之人與十方聞者多所感發為一時女修之最卓卓者彭定生立名說泰州孫靈波何以名定生也自不肎信往生而玉尺命名以慰之也費孺人陶瓊樓阿環阿瑩為二林之眷屬演一脈之香光數傳而後兵燹書籍散失二林之風猶存於其家玉尺得見十六觀圖上二林親題之截句晤其曾孫菊初及其第四第五曾孫女五即定生也告之曰我與四方同志已募刻二林先生書幾過半矣有家藏可出而見示以引發眾生堅信淨土之心遂為宣五戒勸助刻般若兩三年中一發禪機銳不可遏其中親到處人不能知相見轉希矣原其本力自足生西取第一義以為之骨則上品人也蔣氏念佛記江都夏智因蔣氏名蘭徵如皋人適同邑卜姓晚年道號貞一子生時母宋夢香雲繞戶淡妝仙子握蘭入室而生幼端淑言動以禮法家有觀音大士像虔誠禮拜晨夕無怠事親孝年十餘歲兩以割臂肉救父危疾喜讀書兼工吟詠出語皆清妙既嫁孝於姑姑卒夫亦以毀卒蔣氏遂𢹂子與母同居督課之餘勤心念佛祈母壽中年子卒媳亦殉教育遺孫事必以禮壽至九十三未嘗懈也素修淨業時有悟機臨歿時異香發於寢室預知時至含笑念佛向西而逝也未歿前有佛光照身蓮花現前之異并有異鳥如小鸞鳳百千相隨飛集庭樹三日大斂時面色如生手尚和輭氣作蓮華香陶陸氏傳江都熊潤生陸氏蘇州人性慈善夫陶某子某皆信佛女證西造蓮花精舍氏住焉晨夕修淨業同治癸酉入夏至秋病不愈食果飲大悲水謂子媳曰我死汝勿哭多念佛好自知八月十日死沐浴更衣設香案命家人轉大悲呪四十八徧不見餘像但僧眾與韋䭾而已遂念佛而終頂煖室有異香初名妙某後改蓮依志欲佐玉尺刻經之事雖未成神明可用也金寶恒臨行記江都王生寶恒江蘇金氏女適某年某十某卒於江都課洲玉尺之赴課洲也僅矣忽一日過草菴寶恒來謁有病矣而心神尚清玉尺示之以詩曰子果雙離業繫空鐘聲琴韵大悲雄飛來十面金剛手不向人間數落紅寶恒得詩神明精進繫念淨因無一襍想至於死而依戀之心倍增也其母遇一因寶恒而起精進之心亦至死不改云天空子記如皋石麟天空袁氏女適潘性渾厚有志於佛法未充滿其求志益奮思傾吐所有以助刻藏經念念如是久而病熱助刻之事亦不能自專顛倒中猶以此為念無二想也嘗曰吾聞玉尺將行魚我死精神隨魚聲往來終不離全藏之因也噫戔戔自修其淨土戔戔吝出其凡財是一切眾生之通弊也而天空獨出手眼雖死不衰必朗朗乎遊淨土之中而不滯者也王才女蓮發金陵王氏女名才子許字於人婚時作種種言狀如天龍所附三寶所加日日如斯遂為人說法皆慷慨中病有出塵之風不逾月而身死此事金陵人以為狂亂也細思之定亂之形非肉眼所知也此皆抱修行之志為世法所牽鬱久必發遂兼前業而并現故或抗或墜或歌或泣如司馬君實病中夢語皆關天下生死大事何能以狂亂埽之乎玉尺為回向彌陀名曰神定書張福音病中付託如皋石麟如染香人身有香氣如子逃逝雖憶何為有德霖徐氏女與張女善皆欲乘清風鼓智翼翱翔於虗廓張之中路而岐也岐非其罪人間世也適丁矣病矣死矣未死而貪生在生而求死人情邪非人情邪反覆之機真𢆯之路豈人天之所能測邪其言曰我死必倚玉尺為度脫彼悲願之力大於人必能救我及死而眾人擾擾莫或依其言久乃傳於玉尺之耳以為張有如是如是之說也張之心張之身張之妄張之真烏乎張平生見玉尺無一言而神明則冥熏於蓮花香海久矣故如是說也如是說也不相違遠同於形影慧雲吟并序如皋何琴軒慧雲茅氏女居江都與王姓同宅隨寶禮寶智等棲心三寶小小孺子也不二年智來告於玉尺曰雲已適人矣俄而渡江省其母玉尺見之觀其容若有所欲言而未得者未久彼亦渡江後再來玉尺未及見作偈寄之慧雲持詩而泣曰吾不復得見師矣返江南不久而卒慧雲有淨土願娑婆非所樂也吟曰草草娑婆寄此形光華水月映天星何時樓閣玲瓏住長共虗空一片靈聖寶傳泰州周國定人之麤妙秉氣之或徧也然密者或刻深而誤事疎者或慷慨以立功則又何處定評哉則以性天厚薄之不同而又以引生將來之遇合臆必矣於不知不覺之中而猝為鬼病之所傷使有心人不能措手足於其間固由其生生世世之決擇於法門者淺也然三寶深愍者此人善知識之所必救者亦此人暫時之苦將來之樂其尺寸烏可以道路計哉彼明明斤斤者至於寐夢之地不受欺死生呼吸間尚未或讓人以尺寸然明在世間暗於出世則生平一切之明皆獲暗報焉非因果之相妨實造物者待斯人以不爽也水陸之行於雞園也無特薦其功之大者前列焉每列以四人皆有功於三寶無罪於娑婆者也不然有功力於全藏者也不然其才志之大有可造者也壬申之年陳孫氏聖寶與焉七日聲光龍天齊護彌陀接引徧於虗空有以卜其精神之早圓於法界矣伊女慧本有志於修亦童女中之傑出者崇順傳靈通子有奇氣者必有奇才有奇志者必有奇遇風雲雷雨未嘗無變化於虗空之中而眾人不知仰而視之去而忘之迫而求之疑而訝之此雖日與神明親而不免昏暗之伏吾於崇順之於玉尺見之矣當其初虎率以聽迨其後他歧入而信願不濃矣命功也儒術也何嘗有一端非菩提之全力但以一門未徹之人而襍進之其得力必希而其害本願也必重然借其人之境煉玉尺之關期以成就乎道場并以引夫妙先子西方之一線則斷斷乎有餘也反復進退數年不能休而終未忍自絕其本願論者以為空中大士借水以行舟而非正度此人秘密金剛之機每不使人驟窺而但以全乎一時之作用噫斯言信乎哉吾聞其背玉尺而不能安欲近事而又阻於吝者之眾區區淨土至命終而猶眷念於心葢襍氣未清固不能揚上上之清芬步蓮臺而覲佛勉成中下可惜之機也斯言信乎哉其家有妙先子者能誦圓通品與女土清即相映發也樂淨傳依許來稿縮本樂淨道者趙宜人許遂菴中丞副室也幼頴敏黑夜飛鍼走線遇佳山水一往有遺世志髮逆竄武林𢹂子西齋赴水遇救不死有老僧指引出朝峨嵋禮普陀師遂翁以求禪理命名侍摩聞靈虗念佛歸心淨土坐中不見根身器界佛號自空流出風林水鳥無非佛音聞紅螺悟和大師說諸經義多觸發戒名淨證自號樂淨道者集眷屬課誦兼禪觀有叢林風佛七領眾時自謂如在定中不自知為經行也法雲寺傾發心修建有放生湖濵見居民活剝羔羊者歸述其事道人脫身裘永不服石香禪宿問念佛的畢竟是誰機滯香痛下鉆錘了凡首座問人人有箇影子為甚步步踏不著他屢答不契愧甚月餘疑情不釋一夕吹燈大聲曰踏著了也嘗曰參禪人易蹈空念佛人恒著有真了悟者隨願往生萬牛莫挽病增劇形消損神炯然坐九晝夜知時至囑後事纖悉無遺或曰何不全體放下答曰早自空空更教放箇甚麼西齋悲不自勝道人曰生死本是空花癡兒何作此態心持哭失聲道人笑曰不要癡了日午請接引佛像到開目注視良久自以手整巾怡然逝頂猶溫云陸嫗事迹申報蘇州閶門外三樂灣陸姓老嫗年七十餘好持齋念佛光緒丁丑二月十二日忽自櫛梳沐浴更換衣服危坐榻前手持念珠朗誦佛號未幾寂不聞聲家人至點燈後呼其晚飯不應逼視之則已閉目而圓寂矣寶定事述石麟世人之善惡可謂無憑哉而人人妄欲憑之以各酬其願既酬而不能久則又希仙佛賜我以長生不死之地幻哉心也然三寶即妄點真不作揀別故貪者滿其量歉者助其力無一眾生而不得其所欲佛恩哉如必欲洞明淨土而後許其往生往生幾人哉佛恩之難報第一也以俗眼而衡得失之輕重幾疑事理之不可憑而不知其各有憑依之因以滿足顯現其一時之果也但彼雖滿量佛猶歉然如兒哺乳不知五穀噫吾於呂李氏寶定之臨終不亂也見之矣休談品位且入蓮胎此為急務楊氏楊氏幼適鎮江吳姓居北門中年即喜茹素奉佛光緒丙子年染疾至十二月困甚其子明通懇祈地藏大士願以己生平誦持之力為母求生西方淨土并超脫母氏累劫冤親楊氏心益感奮念佛至二十四日坐逝年七十八歲其子於其七期請眾人念佛至第五日燭上現蓮花佛像同見者百餘人皆發信心嘆其母子依佛之誠也妙諦子銘諦適華一年而卒如皋石麟江都東鄉花園溝樊氏之寄女姓姜名弟弟諦音近故一名妙諦焉諦如寉羽如叢蘭風雨霑之而不能暢其物之性死矣海天妙嚴兩精舍之人哀而祀之以其心靈而志遠初不以迹之滯而墮其神也神其來乎哉銘曰十六大士金剛四四密護四方有菩薩名為金剛慈力迅疾灌頂實與妙諦位中名次相暎護而為吐解脫之光芒妙諦心莫哀佛有風雨兼雲雷令汝解脫還汝願青青蓮萼空中栽性霽神融一印同空字金色化現無量壽青黃赤白香潔微妙中十身靈相寫浺瀜寶華亦有志其戚也梵書也讀若左位次者以三十七聖圖占修行因果相也船婦事記寧波周蓮慧船婦某苦子媳於之逆訴於船客客教之以淨土法門且曰精持佛名不暇與惡人計長短即現前解脫也船婦依而行久之純熟佛不離心一切時皆以念佛為境界其病也其死也其琅琅然念佛而去也殆有聰明才識之流所不及者客即孫居士某遇修傳所適不善童葆澂小兒女之作略必戔戔於目前然一見之餘全神得力遂成畢生之遭遇又不可以小兒女測之必謂出於他人之曲折以完其未竟之志然不有本因則緣何自生乎玉尺之懇切以為遇修者切矣往來其間而必成全此遇修者蔭本也蔭本以曲中之直能自拔於流俗懇懇勤勤必欲致一人於三寶之前其心思誠第一至於能感蔭本之出力而并深結夫第一緣以永順乎道場而棲神於善知識之左右雖一時遲鈍而終古長通矣此一切世間男子之所或未然而遇修乃獲此不亦快矣哉彌陀攝受萬品千倫而於極可愍極可重極可惜之孺子將有不待其近前而速呼善來以引之者在此遇修歟在此遇修歟玉尺未代作佛事之前與遇修遇立談不數語每言其清純之氣郁郁然非流俗中人也書本一事冒同慶本一姓陳氏如皋人幼靈緊適同邑盧長齡生二子能佐夫督其課甚勤尤喜詩古文詞年四十二歲卒於七月二十八日寅時生於九日未時癸亥年起信心己巳年歸依三寶取今名遂相其夫理如皋刻經局事終其身生平於玉尺所作夢遊五律十首及同邑蔣元亮無量壽佛十頌最喜誦之臨時預作一書命卒後寄磚橋書中言受玉尺教澤甚久於第一義未能直入有愧師恩然嚮往大乘護持佛事接引後進始終如一今雖知死然魂魄必赴雞園佐佑刊刻機緣俟書本全藏之成也病中每以未見大般若功成為憾玉尺於盧宅暫庋般若經板者年餘時本一與本音即長齡每結期於庋板之處七日閱華嚴一周玉尺題其門曰無心便入華嚴定有福能生般若光於華嚴不著有於般若不著空此本一所服膺者也靈勝一蓮頗蒙熏護月潤意三人則道場往來最習之伴侶鏡閎靈音時化等淺深不一交助發光亦一時之盛矣卒之月望日預知時欲至十六七日邀戚友敘別十八日畫師來傳真本一手取玉尺所書鏡影鐘聲閱之至西江月下半云辛苦半生今欲厭彌陀正念殷殷指示兒輩以示意生平每恨人死多昏沈又言修行人退以臨終為最利害生平雖未持戒律而病甚則斷葷血多食水果不與家中人依戀雖至戚中婦女問疾略答一二語即垂鉤坐帳中不再語二十五六七日并幼子等亦不欲其來見唯本音德涵其長子靈勝族女鄧姓舊婢四人念佛以送之赴雞園水陸者二作生前七者一拜吉祥天品七日者一護刻經及及水陸放生諸善事以十年助刻續補修西聞見錄者錢二萬病中每云我若有靈終不離大般若經也捨六根說石麟觀人之死可以知其生生平之煉臨終之驗三世如如一境也本悟達第一義天固不以死生論周潘以下多未免起伏交參女士中若本一者其足以風乎一以天明逝每日常課至卒之前夕猶不虧彌留數日中或自言入佛宮殿樓閣他無所見也臨終前自言有師僧在門問陳子雨孝廉女住處見此師入門未久而卒生平治家事接物馭下精強第一至用之以禦侮亦不幸之一端也然一入於佛因果不越絲毫內釋外儒坦然規矩豈巾幗中人乎二十七日猶至幼子新婚之室二十八日即逝著衣時有人勗以念佛厲聲答云曉得遺囑去後不許哭但焚香念佛請師僧作繫念佛事畢乃殮且曰鏡影鐘聲寫本長置靈位前日日多誦之以代供嗚呼六根齊捨得力在平時豈巾幗中人乎鏡影鐘聲有云發願要實觀境要虗虛中之現境乃靈實處之棲神最穩久之純熟自然處處得力又曰用力不如用心實處提得空便是得力時候又曰自心起分別日用中苦事也用心於天衣無縫處非有分別非無分別修途中樂事也又曰靜中無有靜故是真靜動中無有動故是不動又曰十分辛苦法輪開龍藏光華出異才但使英雄能卓識玲瓏便現玉樓臺又曰熟處轉生生處轉熟一點靈機無邊寶脈又曰泠泠鏡裏寶燈雲十面𢌞環識主君妙訣從來無一字勸人領悟不聞聞又曰妙雨初洒清風入微靈靈一際蓮語芳菲又曰本一汝近來功夫何如沙永安定於十一日雞園冥戒戒名寶性不著雲霞色更明不餐煙火氣彌清有人染得蓮香足何用塵中說姓名又曰情量本有可破之機機先機後不隔一絲拈起來便是放下來便是是中無有商量也又曰一脈精神遠更良玲瓏法界總香光多多事業成何用樓閣虛空趁晚涼又曰將一切心事放下拈起來要用便用萬法都靈不可滯也又曰光陰不早了要刷刮方佳又曰青青一脈是蓮修人駐花嚴最妙樓獨有憑闌消息在月華無際照神州又病中命人補鈔玉尺詩云飛來一片寶光音十二根塵即是心多少月華齊吐露半空花雨澹雲林飛起靈心澹更長世情消歇佛圖香不妨滿現經綸手王宇金颸透晚凉長途辛苦此應閑面面光華識聖凡又見一時真際遇本來人不滯關山雞竿揭起赦書來天上恩施又一回好自商量真去住莫將消息與人猜虞陽刻經處檀越季蓮音誄并敘石麟季蓮音常熟人適同邑石氏初號妙性常居母家性嗜佛受菩薩戒於刻經僧為人樸實長厚與王陳張諸女士往來與趙李蔣諸人暎帶一時氣象蔚如也王名皎月陳名蓮語靈復靈開張失名又有王蓮韵周蓮芬季姓曹姓朱姓亦有信心同襄佛事曹名妙明朱名蓮暎季即其母家妙圓等故刻經之處亦分設於虞山雖曰范趙翁朱諸居士振其綱藥妙諸師啟其緣而蓮音母女親族鄰友之熏發護助其功亦不細也十年中水陸道場誦經呪度亡靈接引殷殷為常昭女修中之最第一矣眾生不幸娑婆長離光緒四年正月二十三日午時於念佛聲中安詳而逝誄曰蘇杭靈秀暢寫東南靈而近樸蘇之虞山虞山之英少女靈復款款蓮音同工異曲乾坤清淑有此瓏玲感發人天暎月銜星化成文字般若現前空中得力素貞天然李姓蔣姓事述冒同慶寶山范居士西民曾館於常熟蔣氏蔣之主婦念佛頗切當間與趙李周諸女士相往還視聽深隱人莫窺其際似以禪那力為淨土之修者其卒也與季蓮音相先後安禪子哀詞石麟其人藹然其境蕭然其志肫然其氣頹然其眷屬盎然其知識迢然其年登八十一也蔚然其願趨四十八也依然杳然其像泠然其望然其向往本成悟真德愈等善根各有淺深皆眷屬之列光明成就論石麟光明子江都王氏適姜夫死撫子成立子又早卒撫及其孫年老乃志於佛每赴雞園向玉尺求蓮花圖以供課佛之用於海天精舍往來十餘年姪曾孫女王靈生及其女僕靈安等皆所引發也姜王兩姓之信心光明肇其端久而各隨其高下以為嚮往本鈴神融其最純厚者也年七十七倍誦光明讚持杖閱三進屋及庭至檐下置杖棒書而入循循倍文如孺子尤其不可及者矣光明讚者金光明經中一佛二十諸天頌以題於二十一軸之上者皆長短詞句其出資助畫及道場襄事者若干人以一句映一人光明子占得北天多聞之第四句曰寶光飛集藥叉閑知淨土之因稍滯矣卒後為禮大悲行法二七日以三十七聖圖占之有金剛眼之兆其即大悲接引入西方蓮花部中歟當習誦光明讚時有人問之曰汝老矣一心念佛猶恐其緩習誦光明讚與娑婆諸天結此幻因何為者光明子曰我小乘習長為玉尺所訶今此光明讚勉而習之以作將來之用其用有三一未生淨土長為天所攝護也二能生淨土長與諸天宏揚妙法也三既生淨土十剎度生慧相現前長與同一事體也附光明讚二十一首光明鏡暎現本無方圓滿虗空涵寶性飛鳴樓閣帶天香身剎共悠揚佛寶鏡玲瓏三昧起聰明富貴都超殷勤培護不言勞澹濃齊佛韻絃外眾音消回轉人天成法會千千瓔珞難描菩提光影剎塵交虗空樓閣在眷屬豈迢遙吉祥天英銳無邊禪力透獨標柔輭光芒菩提化用本精良慧鋒兼手口威德滿封畺放下從來拈得起寧論地獄天堂靈心四暎絕紛哤樓臺燈鏡剎天樂普鏗鏘辯才天童真住妙化本無私點綴山河成畫稿從容花雨寫靈知明月照人時梵王臨馭遠威德四王欽位寄中天超二地芳傳十剎暎千名善法一堂熏帝釋真富貴宮殿五雲間香篋滿盛迦利好寶光飛集藥叉閑人不滯關山多聞天王音聲起大地及山河目送手揮依佛久移宮換羽感人多海印現娑婆持國天王花嚴會不繫福城東靜定光華天地外玲瓏煙水畫圖中三昧火初紅增長天王神化滿消息不言秋萬品裝成銀色界一珠飛動水晶毬圓極更周游廣目天王天金色環暎妙高峯自有光華標德相豈無時節照童蒙暮鼓又晨鐘日天子無定相宛似有心人消盡閻浮增減謗清涼秘密寫精神圓極是真身月天子奇特用鎖索并鉤鈴雷動風飛音有主冰寒火熱境無心顯密共靈靈火首金剛玲瓏起披閱大千圖一片聖凡雲霧集無邊燈剎眾靈趨隻眼勝明珠摩醯首羅天王精氣旺神俊倍玲瓏振作衰頹知見遠總持部落法畺雄星旆動虗空散脂大將飛到也菩薩是將軍佛法僧伽涵寶潤旌旛甲馬現慈雲恩念普同熏韋䭾尊天香花奉圓滿更幾希結實涵虗全有用玲瓏窒礙兩無依寶相暎天衣堅牢地神回轉妙曲直寫靈知自有高華銜佛脈更從依戀得良時美蔭豈遲遲菩提樹神彼此住無生幻現生生用五百英才聚一時平等何輕重點化最通靈愛惜方知痛最小堪憐普護持法界慈威共鬼子母天日月自循環運運開先路無限崎嶇化作平轉轉成靈度今古白衣新脈脈童真住多少含生望吉祥妙妙誰知處摩利支天雒誦眾龍名神用真難測第一威靈聖德全風雨雲雷色飛動寶珠光弱女先成佛宮殿波生大海潮小慧蒼茫失娑竭羅龍王變現大悲靈莫認空中畫花事從來不著身增減都成罵生死本無關一悟千機化冰火摧殘善惡心頃刻成聲價閻摩羅王張瞿氏梅香國張瞿氏常熟人棲心淨土避𡨥東鄉禮問竹為師受八戒齋一年後向西念佛而去徵應不必奇於不顛倒中可知彌陀聖眾之引也曹母往生說冒篤慶事不必常見常聞也亦不必求罕見罕聞也機動於中境應於外其神理之麤妙可知矣曹母妙明者常熟刻經處友人朱保之居士之岳母也保之信佛法好二林之書其妻蓮映求五戒助理刻經事久病而卒其母妙明繼之妙明之去也念佛之聲自其口出達於室中過戶庭而去其精神之造詣可知矣有疑之者作種種說折之曰噫萬法互有無非有無也彼此相同異非同異也依他全託於圓成得手何勞於徧計但脈脈之當心自泠泠而得意繆寶均所託二人銘胡鏡之玉尺涉世獲交繆君玉尺集古繆述所云修西一冊其光醲醺繆有兩名助此見聞兩人事迹名相各分已入錄中蓮萼流芬眾生不幸盜犯斯文文隨金杳其稿如焚繆病以死難致殷勤煉石補天但見祥氛爐煙非篆空有香熏優婆夷中馥馥馚馚還一之機李生王本泠之祖母寶瓔之姑也法名還一戊寅重陽卒其人神清氣靜忍耐而志於修每見玉尺必煑天落水為茶勤勤奉之歸三寶近十年無一端之失病不數日清淨因中念佛而去本泠與遇泠印霞同新等或念佛以助其行或誦經以轉其識甚難得也本泠純乎天真粹然孺子香光之熏發不獨尤寶安冥受其益而已本泠即於戊寅年雞園水陸道場致書玉尺求作佛事玉尺曰佛事已多矣吟舊詩曰柴門靜對三篙水古鼎閑消一寸香有約不來緣底事未應忘卻鼓音王遂為還一製道場儀誦鼓音聲王陀羅尼兼觀紇哩二合以密宗宏淨土此震旦之新機也萬法同源還一無難矣鼓音聲王陀羅尼多你他一婆離二阿婆離三娑摩婆羅四尼地奢五昵闍多禰六昵茂邸七昵茂企八闍羅婆羅車䭾禰九宿佉波啼昵地奢十阿彌多由婆離十一阿彌多蛇十二婆羅婆陀禰十三涅浮提十四阿迦舍昵浮陀十五阿迦舍昵提奢十六阿迦舍昵闍啼十七阿迦舍離十八阿迦舍達奢尼十九阿迦舍提他禰二十留波昵提奢二十一遮埵唎達摩波羅娑陀禰二十二遮埵唎阿利蛇娑帝蛇波羅娑陀禰二十三遮埵唎末伽婆那波羅娑陀禰二十四婆羅毗梨耶波羅娑陀禰二十五達摩呻他禰二十六久舍離二十七久舍羅呢提奢二十八久舍羅波羅啼他禰二十九佛陀久舍離三十毗佛陀波羅波斯三十一達摩迦羅禰三十二昵專啼三十三昵浮提三十四毗摩離三十五毗羅闍三十六羅闍三十七羅斯三十八羅婆正三十九羅婆伽羅婆羅四十羅娑伽羅阿地他禰四十一久舍離四十二波羅啼久舍離四十三毗久舍離四十四他啼四十五修陀多至啼四十六修波羅奢多至啼四十七修波羅啼癡啼四十八修離四十九修目企五十達咩五十一達達咩五十二離波五十三遮婆離五十四阿㝹舍婆離五十五佛陀迦舍昵求禰五十六佛陀迦舍求禰五十七娑婆訶五十八書唐代軼事女二十四孝傳新安丐婦張李氏貞觀中年三十餘歲貌尚美扶瞽姑以行乞問之曰寡五年僅此一姑不忍捨也姑性燥愎多罵詈李忍受之乞得必先以奉姑自長飢餓有富室欲以百金聘之命媒伺其姑怒罵從容諷諭李正色曰願從婆婆死不知其他有少年投以銀及衣飾李罵而擲其物姑沒竭力葬之乃削髮為尼八十八歲端坐念佛而去嗚呼此真淨土中人也世之泛泛念佛者可以愧死朱孺人傳梅君成瓚室楊省愚朱氏名荷寶武進人父銘和以香為業老年性轉燥唯孺人能得其歡年十一即能司饔餁然既長而如不勝衣葢勞瘁過也一日天暑父急需香而工不在孺人代磨晝夜用力遂嘔血年二十歸於梅未一年而病死庚午中秋後二日也孺人和平恭謹而毅然不受物之遷以父喪多持經呪遂染香於淨土絕葷血至於捨命淨念不忘也梅戴氏德意銘詞冒篤慶梅母德意年四十七光緒三年卒有子香國香國赴杭州經局母死未及奔喪母送子行不聞子哭不念其子轉命其女使長女性滿依海天精舍修行以了生死卓哉此識獨有千古其卒時姪女慧香適至念佛人不約而同者甚多羣以為異及母之二十七箇月喪服滿日玉尺適至其家遂為說冥戒此更非思議所能到蓮逸傳石麟蓮逸通州陳氏適人而寡依季姓以修遇玉尺受菩薩戒得今名性渾厚安詳每見玉尺欲細詢所未聞不果卒於光緒五年淨業頗純死不顛倒年約四十云王葉氏傳常熟張寶權葉氏余內祖母也年二十一歸余內祖蘊香王公公時勸以念佛然上有舅姑兼家事縈繞弗克專也年四十二為長子授室遂置家事於不問一心持佛名家饒於財顧勤儉恒以紡績所得散之貧乏兼作眾善年五十六微疾謂長媳曰汝為我易衣履諸子因跪床前唱佛名自亦朗誦不輟合掌而逝香氣滿室中蘊香公雖以念佛勸人而溺於風雅好流連詩酒之間或不能單提淨土平時習氣如此文人自古往往以此而誤事業況修行乎然聞其臨終時亦能唱佛名此心地純善境界平和或眷屬所熏或前生善根當熟往徃有臨終反勝於平時者然未可以為例亦幸事也寶貫其孫女也為余道之甚悉
