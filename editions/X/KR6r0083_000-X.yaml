front:
  text: 修西聞見錄目次卷一比丘自序述定意老宿事武林汪善慶書定意老宿事後如皋蔣元亮天甯普能嵩禪師淨土詩序吳淞范國俊鳴皋傳蓮發法師身後緣記無錫余治頌德慈老宿儀徵陳則兢書靜波禪師事如皋黃文波書靜斬禪師事泰州周國定雞園念佛僧文明事略江都鄭應房書明舟師事泰州努蘭舫書達源師事蔣元亮僧心莖別傳儀徵于養浩靜悅傳周國定蓮發傳如皋石麟蓮慶哀詞石麟福魁傳大根松園傳大根行僧記無名氏銘初傳稿大根福元傳大根某僧事述武林高原經如傳大根宗道傳稿大根體成傳稿大根懌安傳稿大根自明傳稿大根如月傳稿大根善根傳稿大根月參傳稿大根施念藏小傳鄞縣周生悟開事略常州董淨空行僧廣寂讚并序胡鏡之阿彌陀佛篇朗月卷二比丘尼量海尼傳稿蔣元亮廣元哀詞泰州冒同慶量海軼事蘇州姚古明寶念出家之切胡鏡之靈義傳金陵朱生寶進進字說石麟能持事略紹興慧音明恒傳德修卷三居士豐伸布贊海陵程紹昌書吳刻花嚴合論後無錫余治周貽樸事略泰州陳第序龔令事泰州程宇光論張淨庸汪善慶陳抱淨軼事蔣元亮禮翁吟陳第傳述陳第事儀徵于養浩程宇光別傳蔣元亮鍾培棟小傳程宇光十五洲初圖䟦蔣元亮鄭老人別傳胡鏡之于藍澄事略泰州孫靈波憶守鏡老人詩并序湖南曾傳錯陳定修事略通州李漢卿吳小泉周國定吳抱惕蔣元亮韓士餘傳童葆澂贊汪法如居士江都徐國楨徐訓導小傳通州潘一山胡槎仙事略冒同慶何琴軒如皋石麟序蔣元亮無量壽佛十頌江都熊潤生論生前七事憶潘君通州李漢卿孫蘭舫小事記甘泉梅香國書周君事示同人如皋石麟新建蕭君事迹一願程松巖童亦舟兩人小記甘泉梅香國譚壬生事述陳第李漢鄉傳石麟童寶靜傳略胡鏡之程君竹溪小記冒同慶鄭同軼事熊潤生余蓮村翁行事熊潤生許貞恒居士入佛小記泰州李景鄴書徹如居士事梅香國西園道人傳楊省愚吉德興十三歲事吉母書奉化杭州兩居士事德修韓清塵小傳張寂卷四善女人周婆事述出庵雜錄無慍唐孺人母子緣述泰州朱竹咸常熟某氏婦事述石麟杯露記通州李漢卿虞山蓮韻記石麟徐太夫人傳徐國楨許母徐太夫人別傳唐持平喬夫人軼事泰州陳第正覺子傳蔣元亮書善一事泰州趙大禮彭定生立名說泰州孫靈波蔣氏念佛說江都夏智因陶陸氏傳江都熊潤生金寶恒臨行記江都王生天空子記如皋石麟王才女蓮發書張福音病中付託如皋石麟慧雲吟并序如皋何琴軒聖寶傳泰州周國定崇順傳靈通子樂淨傳依許來稿縮本陸嫗事迹申報寶定事述石麟楊氏妙諦子銘諦適華一年而卒如皋石麟船婦事記寧波周蓮慧遇修傳所適不善童葆澂書本一事冒同慶捨六根說石麟虞陽刻經處越季蓮音誄并敘石麟蔣姓事述冒同慶安禪子哀詞石麟光明成就論石麟附光明讚二十一首張瞿氏梅香國曹母往生說冒篤慶謬寶均所託二人銘胡鏡之還一之機李生鼓音聲王陀羅尼女二十四孝傳書唐代軼事朱孺人傳梅君成瓚室楊省愚梅戴氏德意銘詞冒篤慶蓮逸傳石麟王葉氏傳常熟張寶權卷五童女序葉涵虗往生儀徵徐子團扇題詩記為韻之作童葆澂題詩說何琴軒陶十三齡入水陸道場說江都吳小泉圓淨子記程宇光高大願事述程宇光在中銘冒同慶記聖全事蹟蔣元亮孫懷子讚如皋蔣元亮上海列女論蔣元亮琳誄泰州孫靈波如願論常熟程松巖翡翠骨頭記常熟童葆澂周靈開小記如皋蔣元亮徐靈初常熟童寶靜靈復傳略常熟童葆澂神遇願無錫余治德初哀詞石麟徐妙淨哀詞并序常熟童寶靜尤寶安頌石麟覺鴻傳常熟童寶靜昌其孝讚代玉尺作童寶靜馬靈義讚童寶靜周艶芳傳童寶靜叢信芳讚如皋石麟鼠灘張女議蔣元亮李素貞讚童寶靜劉寶仁傳江都熊潤生秋雲暮碣童寶靜錄修一軼事石麟童女哀詞女幼失母為周氏養媳卒於戊寅夏楚客曹蓮生像讚記長慶月善小記寧波周蓮慧曇影道人傳常熟吳寶叢卷六雜流朱道人事略雲陽子鄭抱因周國定一切人能成聖用說鄭應房書姚佛度事楊省愚書江陰某甲事楊省愚卷七異類鼠事長慶蜈蚣說玉清生化鳥神物能超淨穢說李生修西聞見錄目次終
