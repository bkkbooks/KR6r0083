body:
  text: 東土雞園偶集朱道人事略雲陽子朱道人丹陽民也為本縣昌國寺司香火齋戒念佛人咸敬信之忽一日謂鄉城諸相識曰我欲化汝等薪一把積之以焚我身或笑之曰汝圓寂耶若不自焚我等來焚汝至期大眾都集道人中坐徐起坐薪上命眾舉火眾不忍乃自焚焉昌國主人奔而赴其前道人心忽飛出主人哭而滅其火納其心全身皆不壞乃鎔金以加其上人皆見道人坐雲中鳴魚西去凡地方有警人皆預見道人坐雲中擊木魚聲聲入聽鄭抱因周國定抱因揚州鄭氏子為酒工棄而傭於廟不樂也自投而歸於玉尺願侍左右然光不定又慕襍教某而聽其講以為念佛不必出聲遂一病而不能念佛以至於死抱因為人頗有心於布施接引於念佛尤力每天寒四更在雞園彌勒殿繞案而誦佛名聲搖搖如大地微動玉尺心喜之乃以同住中有一先輩恨其妨於睡止其高聲遂然不自伸故非人得其便引而致之襍教之前也後玉尺為彼供燈鏡誦大悲呪呼其名七日然後大作佛七以拯其魂爽抱因之淨土本在空中無有障也一切人能成聖用說鄭應房凡工匠之作佛像者必生天故刻帝釋書之人或轉身入忉利天得小部署此理之常無足怪者黃生打鐵而往生彼是修得非報得也報得者自不知修得者自知之一有心一無心也書姚佛度事楊省愚常州三河口老農姚佛度不食葷血喜行方便利益事眾避紅巾老弱疲於行佛度挺身負之竄往來救脫數百計寇退富室設粥局佛度往司事者曰汝來食粥乎蓋以其衣藍縷也佛度曰否我來輸粟則磬所有以濟人謂人曰越日西行矣及期端坐而化書江陰某甲事楊省愚江陰某甲以技自食碌碌也遇西園道人方以淨土書四散勸人某聞風而起遂半日治生半日行持路中亦佛聲不絕忽一日謂人吾七日後往西遂精進一室飲水稱佛名及期坐逝同人置缸中匇匇避寇三年後啟缸視之全身不朽
