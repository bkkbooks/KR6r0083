body:
  text: 東土雞圓偶集鼠事長慶咫觀老人初不信佛玉尺密祈彌陀加被已數年矣赴浙闈隨老人至上天竺觀音冥力轉其機是夕老人夢一庭花開手持鰣魚半尾附玉尺將帶烹之一百日中發心念佛遂漸次斷烟酒葷血勤閲大乘典籍館麻村將十年居停家有鼠靈然默受熏染坐化不朽老人取歸裝金日供香一枝曰此亦善知識也至今鼠像在海天精舍修淨業人每見之多欷歔感愧者海天精舍一名放生菴蜈蚣說玉清生物之獲益於人也雖一時之靈蠢因殊而纍劫之真光平等略栽一粒便獲參天無足怪也蓮池淨土中人也出門見童子以竹篾弓蜈蚣之身哀而贖其命他日蓮池對客說法蜈蚣能來聽之事閲多年而因非偶爾其化為人天妙相以趨淨土也久矣化鳥神物能超淨穢說李生凡有般若心而不能勝出口才利善根顯幻帶惡業誤失人身轉世或作天鳥而說法若帝釋之象神通全與天同非其餘神象之可及龍王上首至超地位而有餘神神交參真假莫測非但西方鳥為彌陀化作而已又若阿彌陀佛入三十七聖曼拏囉中轉名觀自在王即乘孔以表自在不坐蓮花此鳥此佛一耶二耶大吉祥天一切清淨自然而有六牙白象以鼻絞馬腦瓶傾諸珍寶灌於頂上又何自來乎嘗言輪王為一切凡中自在其眷屬靈純者為兵藏女寶其雜作者化為象馬之類此五類有情往昔與輪王雖曰同願而行之出入大矣又如一字頂輪王應念而現七寶其男女蠢靈非實非虛純乎聖凡然化中亦一一有因也神物之乘願輪而超淨穢者仗他力成就或自不能知世之愛鳥愛貓愛鼠愛犬惜未能轉此愛心為所愛衆生作字種紅玻瓈色觀以引作蓮花種族或自身入於物類之中為上首獲勝報焉真下劣之可哀矣讀若紇哩二合阿彌陀佛蓮花部字種觀之大有神力紗用
