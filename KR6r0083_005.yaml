body:
  text: 東土雞園偶集序葉涵虗往生儀徵徐子聞之玉尺曰有一童女修行淨土而去之獨早者為葉涵虗未嘗見其人於高居士處得其消息噫玉尺未見豈獨涵虗乎玉虗子環真子正覺子等皆若見若不見也童女中若其孝若素貞若蓮生等欲見未得見也信芳在中蓮約等死生能得力而目前渺不相知也吾知玉尺之為人言近而旨遠殆非為一人而發也然涵虗去而童女之繼起而去者有數十人則涵虗之蹤幾幾乎第一矣團扇題詩記為韻之作童葆澄韻之漢軍于氏女父翰卿以知府候補江南為兩淮運使書局提調玉尺於同治八年訪方君俊薛君壽於書局翰卿約會食焉及期往出紈扇示之曰此圓光中乃豫女韻之十三歲往生背面像也為畫僧某手筆今請刻經僧題之玉尺遂作序偈遺之而去有摹其扇以示諸道場老幼聞風而起者實不乏人而能德初王神遇乃皆以童女十三歲念佛而逝若繼迹焉則其機甚靈妙矣韻之始生父夢滿天霞光故小字霞官三五歲即不食葷血且慈仁戒殺其性然也七八歲即與諸兄弟別異器用翰卿故取其帕以拭面韻之不敢言亦遂不用此帕也幼字梁卒之年春日梁有信云俟韻之十五歲來親迎韻之聞之慘然不樂遂無人敢言者或有人誤舉梁字亦終日不食遂長悒悒病於泰州以六月某日坐而向西喃喃念佛預言時日及逝期不爽云題詩説何琴軒十三歲女往生圖羅衣雙髻背像現於圓光中有人題一絶末二句云傳得往生真面目箇中消息幾人知圖不現面目而詩云傳得面目亦庶幾不死於句下者童女中殉難者以年近各省忠義録而論釆不勝釆但未必一一生平修淨土故此書未能登入有志者釆為一書另行亦有功於世之作也陶十三齡入水陸道場説江都吳小泉有淨土之因而不免於遇之惡亦世運所拘而人生之每有激清風而起壯志小兒女事耶而何以小兒女之往生能自決也讀天下忠義節烈各書童女之自奮以全其節而清奇濃淡之各極其致者有數百千名而未盡陶女鎮江人殉於揚不由官書而先達於玉尺之水陸壇場得染香光首趨淨土亦遇之不可及哉圓淨子記程宇光圓淨浙江武林人父某呂四場官生八子多信佛者其第五子名原當玉尺在家時為弟子玉尺往來裏河高原引至其家有兩人出拜稱弟子一妙淨一即圓淨也玉尺子初與語有順而無難也三年不見圓淨已嶄然見頭角矣精神向往頗在海天舛錯之機現而不果留滯海陵者一二年而卒卒之時圓淨灑然清毅然精進有英氣焉或曰以病瀉死或曰曾受戒於光孝寺名望日起往往有人過訪之娑婆幻影不足記也高大願事述程宇光玉尺之詣高氏也妙益子引之圓妙二淨出而拜之大願知之未久而妙益子傳語請代誦行願品十卷既誦之矣未久而大願死噫其前知邪相託之深如張氏子而無衆人之隔也行願之詞曰能於十方大苦海中拔濟衆生令其出離皆得往生阿彌陀佛極樂世界大願以身世為苦託玉尺循誦十卷其鋭志往生也必矣在中銘冒同慶許五女不知其名高廉道許道身之女也女已字人不樂有家長穆然深思有出世之志忽病病則不起此超然於淨業故歟其從父姊悟源童真入佛至今猶在也同治七年冬玉尺為其説冥戒名之曰在中銘曰其中何所有而曰在其中蓮花第一枝青青耐秋風記聖全事迹蔣元亮長白覺羅聖全童女也得玉尺之書於其姊善女人善一之手好之其卒也數千里之遙將百日信適至衢道署玉尺為之督佛事且説十𢆯以暢寫花嚴之神明蓋同治七年秋也聖全靈靈之神清清之境皎皎之志落落之蹤真不可及哉玉尺之書論修西之事者也孫懷子讚如皋蔣元亮噫德休死貞專墮山河大地千萬里一顆明珠照不破獨有龍川旋氏使女孫懷子打碎牢關快得一死有心人聞之心歡喜百年駒隙何處是安然昔年手種花千朵今日誰開第一蓮不是蓮花心太苦只因攀折太無主赤白青黃妙妙音橫風吹斷西方路西方路爾獨歸非兩翼心能飛臨死特以數珠挂頸手持之上海烈女論蔣元亮以童女之身而為強暴之所侵逼固天壤之極哀而神明之所共憤吾人欲合虗空法界作金剛祕密之一隻手而全護之矣乃又出於為惡婦之所逼以驅而納諸橫流黑水之中弱女心光圓月也一落影則全相都散驚風闢水半空雷雲而月輪不動真佛子哉受刃之奇往生之助嗚呼真淨土哉琳誄泰州孫靈波寶新丹徒嚴氏女本名琳卒於丹陽冰清橋之宅年未及二十也平日心怯而志專神靈而體薄既字於何不樂有家精心以入佛父母徘徊之寶新恐不免於人間事日夜憂愁年餘病不能起自言工力懈無以對三寶玉尺傳語慰之然以父母未能轉計於口無所言而心則決於一死遂不起矣噫人之入於世者多矣而逃世相者亦復不易寶新誓以童真修死於童真復何憾焉猶記某年佛七之音至今琅琅在耳誄曰蒼蒼者天渺渺者佛膽怯心爭終年兀兀依依孺子何嘗不靈來趨樓閣水月天星鏡影鐘聲內另有傳如願論常熟程松嚴可惜哉英靈之坐困也日覩芳華零落而不可收拾者滿於自前故菩薩低眉有不忍坐視之象然而無可如何也逮事機舛錯猶能收拾於臨終則歸馬殘旗珍逾拱璧世豈無破格憐才者何以抱大悲之心無大悲之用非如願負負如願邪如願陳氏第六女字李夫死而奔喪偃蹇數年以至於死十年前之如願英氣卓然也十年後之如願暮氣頽然也至於天性不忘終如本願雖未能出而大利於人猶得先赴虗空樓閣為水陸之賓亦可謂實不負名名不負實哉臨去灑然無多付囑故知其漸入真宗矣翡翠骨頭記常熟童葆澄陳靈開蓮語之第二女也語欲送入海天為法侶以路遠未來亦能作詩與姊靈復同留遺墨在焉乙亥年六月十一日夢入冥見三法司與之言修行事甚悉法司忽以劍畫地為深坑命之跳跳去即見花嚴境界彌勒云我半月來已換汝一副翡翠骨頭也明日疾遂但飲水至期午刻見韋馱來遂落髮坐堂中自誦彌陀經持珠念佛而去或疑化為靈禽也玉尺曰此樓閣中人也翡翠二字見樓閣懺中同治辛未寄玉尺書中有一截句云一念彌陀萬境真含靈全顯鏡心輪泠泠寶脈華開好樓閣虗空萬劫春故知其兆已見乎詞周靈開小記如皋蔣元亮靈開邗江周女有病坐臥於室中神明之地若與善知識遇然不能拜但稱之曰師自述以告人既而悔之曰生死大事也顯密權機也有益身心何必告人故人不知其詳年餘遂逝徐靈初常熟童寶靜徐靈初泰州薑堰人也年十三四見玉尺求依三寶心純而氣靜每欲赴海天精舍與諸童女慶元初蓮蓮澄慈本等結往生淨土願為境所牽不得往猝然病死蓋厄於魔境而不能自伸者童女最多也夫靈復傳略常熟童葆澄靈復同邑陳氏長女父早卒母蓮語妹靈開皆信佛門復獨秀出如天人年十五聯姻未就遇善知識某公至力救之保其慧命性絶慧雞園水陸主法案所用通論本一二三四卷其手録也能詩工於念佛曾與玉尺子商量念佛音聲有契名之曰真俄而不得見者三年而死其詳具見靈復哀詞中以久病於光緒元年十一月逝自云聞天樂鳴空年方二十復有自題所書水陸通論二截句見鏡影鐘聲同治辛未寄玉尺一首云大體從來未易原含靈曲折況難言心如明鏡涵燈影地角天涯總不暄亦可見其用心之苦矣若海天之真子哀詞萬玉哀鳴有心人不能卒讀神遇願無錫余治神遇江都王氏女居謝家橋年十三曾與同人發淨土蓮花虗空樓閣之願玉尺證明焉忽一日病不一日而死見於母之夢母問汝何往能得人身乎答曰我有願在師前終不受世間輪回身也噫其生平操作如成人能代母勞賢而且孝姪女靈生亦志向不俗云德初哀詞石麟德初江都熊秉德之女字於方刻經處之分設於如皋東門外也曾即其寓宅之前賃屋焉一日有小兒女捧蘋婆果一盤囑玉尺代為供佛玉尺心異之越明年其家人遂請入宅中為二人説歸依其小兒秉德子某其小女即德初也是時年才十二告之以誦持謹記之聞其家人言德初慈且孝云明年刻經處將移南門內既遷其物七日而德初病宛轉數月遂不起玉尺將由如皋赴揚猶未發前一夕而德初逝又自言精神相依望度甚切三呼玉尺而致意焉可感也詞曰第一安心死為上䇿有不死者更是何物徐妙淨哀詞并序常熟童寶靜一行旅雁渡江時十二闌干玉滿枝淨極不知春意暖清涼猶唱卷中詞玉尺何為而作也非為聞妙淨之亡乎妙淨身小而志清境仄而神安遇奇而迹快隨母在安節局年二十矣不放成人衣衣如小兒裝自言年方十數噫彼之自護童身而以長大為患也久矣玉尺屢叩其祈向妙淨首肯而旁觀以為未然猶昨日事也而妙淨已離其夫之家已去其身之命已完其空之神天亦成之人亦順之若空中神明之護助者益以嘆人心之靈為不可測也作哀詞曰吾不哀死者之去也哀生者之弗如吾不哀逝者之短也哀存者之永涉此長途音之哀兮如烏淚之哀兮欲枯心之哀兮如茶哀我生之轤轤愧妙淨之天珠噫亢寶安頌石麟寶安泰州亢氏女也母心源姊寶真寶銘皆信佛偕其姪女遇泠及王本泠為童女修行之約本泠之為人灑然天事而清迥俗遇泠從容入佛精進稍次焉寶安度不及兩人而鋭志獨勝初聞法歸依即殷殷求入玉尺於泰州城東樓土見之者再每有著作寄示之率能披閲記憶或舉大義以示同人自紫雲德霖而下能精心讀書者安其一矣心源死寶安病見童女四人來坐談並招之遊後又見其來遂不起念佛之心猶平日也初寶安有重病聞念佛聲則快然無痛苦惜未能深深入理寫花嚴法界之精神故臨終之際揀別於仙佛之路者甚嚴於上上三心或未能融化然可謂純心倚佛者矣頌曰神何其通迹何其隔有新著書君以為食覺鴻傳常熟童寶靜生如德懷死如慧本年之長少不必同而同於修修之遲速不必同而同於淨慧本拙乎哉巧也巧則不必能上上其自處於中之上下乎有才同於德懷年髣佛乎德懷而一旦長往者飛鴻度影哀咽江流令人發不忍人之心於梁氏之女亢切矣女名覺鴻才十歲能倍誦齋天所用一佛二十諸天頌音節甚清婉習五教説等書未及終事而卒於丁丑之十二月五日年才十二昌其孝讚代玉尺作童寶靜何以落落然而契也何以斷斷然而係也何以格格然而憶也死為習死生為習生習氣能人之之生死豈不能隔別人之平生道在目前人人不會衣中有珠孰知其貴以為遲一念而無妨而不知戈不屬於魯陽以為通一語而未便而不知機已過乎閃電香消爐冷鳥聲闌一卷空存天地間未殉知己之葬猶題私淑之銜染香光寄蓮位音聲中有三昧馬靈義讚童寶靜孺子兀於病見善更相依相依在何處中心一念微宛然靈氣滿一掬可憐擊碎玲瓏玉宛然靈骨委一丘可憐隔斷廣陵舟飛過長江二百里不見斯人見流水月明千古長如此本願寄彌陀天涯水不波周艷芳傳童寶靜艷芳周某某公孫女也僑寓江寧光緒三年年二十二矣久慕淨修持齋素忽一日家人定議將以女許字某門女聞之若無事者然而密作送終布衣悉備四月三日寓書於王女善靈之母求寶塔圖等書中字句若將遠行王猶未介意也家人將於二十五日為女受聘初九日先為女開齋初八日預命庖人購鰣魚女知之微笑而已中飯畢自言微疾閉戶寢久之不出家人視之已著新布朱履臥逝矣面目青色或曰吞毒而死也妙嚴精舍有人在三聖菴聞此事欲迎其魂歸為護法神拈籤得許可告又使善靈之母詳述講往之由於三寶前申祝六月九日迎神而祀之以附於善妙龍李崆胴崔法珍分宜女之次叢信芳讚如皋石麟所遇者生身之父母兮非此人之性耶所寶者法身之光明兮有同空之鏡耶三百里內一紙書中何名何姓言吉言凶代白者邑中之繆抱節者李堡之叢噫吾知之矣仙骨不凡塵佛心無俗韻顛倒大狂瀾寫出無心定無心定裏萬事休蓮花香海一任神遊有時點破虗空界飛上花嚴第一樓鼠灘張女議蔣元亮有彌陀之妙心矣而力未呈也有彌陀之全體矣而用未充也世人比比皆然而張氏之女尤可惜志在修則竟修耳弗遂矣而有待焉猶可也更迫之以死天亦何心哉人之故耶己之故耶照也未破強自逃於境界之外清流之潔寄此童女身尚足以風無盡重重之俗子豈徒勵巾幗之志而已李素貞讚童寶靜玲玲瓏瓏不滯宗風人境自隔性量全通有李素貞生於常熟不受風煙宛如珠玉所結契者大般若經其功未展其心先靈我思全藏多兀於財有力有願尚不克諧君雖已死長護佛書煙水百城神明與俱點化機宜引緣來助江北江南一空一素空謂天空劉寶仁傳江都熊潤生寶仁儀徵劉氏女幼頴悟喜讀父書父覺成好黃老家言晚年有悔心復究心佛法寶仁亦隨父兩轉先受菩薩戒於某寺後其母立貞孝菴復依母出家光緒丁丑春感疾久之自知不治遂罄捨所藏刻法輪懺以莊嚴淨土因九月十九日受沙彌尼戒即於病榻前供佛像起七念佛衆既精勤寶仁益感奮至第三日亥時於念佛聲中加趺而去年四十一秋雲墓碣童寶靜噫此紫雲飛之友金陵陳氏女秋雲墓也貧病中年欲同修而未逮或時勉出與玉尺一見見時示以虗空樓閣之詣謂念佛之家宜通淨士花嚴為一致秋雲疑之異日作書來問虗空樓閣之意玉尺馳書答之盈一卷因濕重體虗遂至不復起噫其講求之一念猶新新也一卷之書名曰虗空樓閣然屢屢刪增不滯舊説也録修一軼事石麟修一通州李氏女字朱十三歲而朱卒修一誓守志夫家不信之曰是幼稚何足徵修一曰若不信我在母家守過十年乃來果二十三而往三十三而卒修一作前生七於生死之際戊寅夏日事也遂卒於五月九日晡時其生也七月一日子時其嫂修來其鄰修起皆與修一母女先後入佛時好好形色人不料其死忽使人請其父母至作別先是數日不食忽食粥數日不語忽言初有汗謂人曰此時不能念佛名俟稍定果以汗解後琅琅念佛而去自言見蓮花二朵人問何以二答曰我一我母一修一兄李漢卿淨土亦切童女哀詞女幼失母為周氏養媳卒於戊寅夏楚客何其步清虗而直往兮保一脈之天真長離世之喧卑兮問佛國之長春羌母與女相依而不遠兮母卒數年耳風聲流入乎玉尺之音輪請從此修一行以成三密兮與千靈萬秀示樓閣之童身曹蓮生像讚記長慶常熟曹氏女名蓮生字於人不樂也好佛二十餘病卒命工畫一童女形道裝端坐長指爪握念珠泠然如生刻經處既設有以此像乞玉尺題讚者玉尺每向人言此人似天道中人吾為引魂魄入水陸道場歸於大淨土何以故靈氣具足必能應也玉尺讚中即以此意鼓舞其神明且為其魂先授菩薩戒名曰寶詣月善小記寧波周蓮慧亡養媳李月善母王氏攜此女屬蓮慧之妻曰為君媳我無憾矣遂育於周於經呪喜誦習不精世務謂姑曰大人何懇切於日用若此光緒四年年二十夏五月先吾母而卒吾師玉尺閔之為説冥戒定法名曰好音嗚呼殆將西歸也石麟曰此未與玉尺一面者也次年春玉尺為印所設經堂則又為童女之可造者也凝秀有神曾一見玉尺欲求開示而未及同堪惋惜者歟曇影道人傳常熟吳寶叢嗚呼死生之際大矣哉自非了當大事去來自在者必以信願持名往生極樂為休息地外此未有能解脫苦輪者也曇影道人者同邑張氏女張氏世奉佛有長洲彭氏風道人年十三即歸心淨土禮玉尺師受三歸名寶芳玉尺器之勸閲大藏未果十六斷葷血日課佛萬聲十八得咯血疾次年六月扶病受五戒越二月吉祥念佛而逝時光緒九年八月十三日也道人性溫靜寡語言不事女工禪課之餘手不釋卷從兩兄討論內典輒至夜分讀華嚴法華圓覺諸經能解其義又精研淨土十要於台賢圓旨頗有會心染疾時誦大般若經至二百八十卷恐不能卒業力疾持誦會常州李上善至虞以一行三昧䇿勵同志道人師事之淨念益堅日課佛三萬聲疾革迷悶甚設像牀前然臂香猛誦佛名聲盡氣漸微即之逝矣是辰告其兄寂曰頃得夢知今日決生安養不勝歡喜常州李上善亦於是夜定中見道人來別云蒙觀音接引已得中品下生矣噫苟非生時信願之堅行持之切臨終正念烏能彰彰若是遺言祝髮以道裝殮捨所受用刻華嚴大鈔五卷從之有遺詩一卷録其懷淨土四絶云諦觀安養境澄清佛日常開不夜城鳥語花香齊説法洗心寂聽悟無生琉璃地上禮金仙妙法親聞聖口宣宴坐澄觀才頃刻娑婆已歷百千年彌陀願海廣無邊憶想慈容即現前何處關山能阻隔盡虗空界現金蓮八萬四千大總持一門一行妙難思他年得與蓮池會曠劫修行也未遲
